<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuySell Inventory Pro V3 Ultra</title>

<style>

/* =========================
   BASE
========================= */
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{
  margin:0;
  background:#f4f5f7;
  transition:.3s;
  color:#111;
}

/* =========================
   TOPBAR (PREMIUM GLASS)
========================= */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 20px;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(12px);
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
  position:sticky;
  top:0;
  z-index:100;
  border-radius:0 0 18px 18px;
}

.topbar-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.app-icon{
  width:52px;
  height:52px;
  background:#eee;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
}

.app-text h2{margin:0;font-size:18px}
.app-text p{margin:0;font-size:12px;color:gray}

/* =========================
   CARDS
========================= */
.container{
  padding:15px;
  max-width:1200px;
  margin:auto;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
  margin-top:15px;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:16px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.06);
}

.card small{color:gray;display:block;margin-top:5px}

/* =========================
   FORM BOX
========================= */
.box{
  background:#fff;
  padding:15px;
  border-radius:14px;
  margin-top:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.06);
}

input,select,button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:14px;
}

button{
  background:#111;
  color:#fff;
  border:none;
  cursor:pointer;
}

/* =========================
   CATEGORY TABS
========================= */
.category-tabs{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:15px;
}

.category-tabs button{
  width:auto;
  padding:8px 14px;
  border-radius:30px;
  background:#fff;
  color:#111;
  border:1px solid #ddd;
}

/* =========================
   GRID ITEMS
========================= */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:15px;
  margin-top:15px;
}

.item{
  background:#fff;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,0.07);
  position:relative;
}

.item img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.item-body{
  padding:12px;
}

.status-pill{
  position:absolute;
  top:10px;
  right:10px;
  background:#111;
  color:#fff;
  padding:5px 10px;
  border-radius:20px;
  font-size:11px;
}

/* =========================
   FAB BUTTON
========================= */
#fabBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  font-size:28px;
  background:#111;
  color:#fff;
  border:none;
  box-shadow:0 8px 18px rgba(0,0,0,0.25);
  z-index:999;
}

/* =========================
   MODAL
========================= */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#fff;
  padding:20px;
  border-radius:14px;
  width:90%;
  max-width:350px;
}

/* =========================
   DARK MODE (FIXED)
========================= */
body.dark{
  background:#111;
  color:#fff;
}

body.dark .topbar,
body.dark .card,
body.dark .box,
body.dark .item,
body.dark .modal-content{
  background:#1d1d1d;
  color:#fff;
}

body.dark input,
body.dark select{
  background:#2a2a2a;
  color:#fff;
  border:1px solid #444;
}

</style>
</head>

<body>

<!-- ================= TOPBAR ================= -->
<div class="topbar">
  <div class="topbar-left">
    <div class="app-icon">📦</div>
    <div class="app-text">
      <h2>Inventory Pro</h2>
      <p>V3 Ultra System</p>
    </div>
  </div>

  <label>
    <input type="checkbox" id="darkSwitch" onchange="toggleDarkMode()">
    🌙
  </label>
</div>

<!-- ================= CONTAINER ================= -->
<div class="container">

<!-- CARDS -->
<div class="cards">
  <div class="card">💸<small>Capital</small><h3 id="capital">0</h3></div>
  <div class="card">💰<small>Sales</small><h3 id="sales">0</h3></div>
  <div class="card">📈<small>Profit</small><h3 id="profit">0</h3></div>
  <div class="card">📦<small>On Hand</small><h3 id="onhand">0</h3></div>
  <div class="card">✅<small>Sold</small><h3 id="sold">0</h3></div>
</div>

<!-- FORM -->
<div class="box">
  <input id="name" placeholder="Product Name">

  <select id="category">
    <option>Gadget / Console</option>
    <option>Phone</option>
    <option>Appliance</option>
    <option>Others</option>
  </select>

  <input id="price" type="number" placeholder="Purchase">
  <input id="shipping" type="number" placeholder="Shipping">
  <input id="other" type="number" placeholder="Other">
  <input id="image" type="file">

  <button onclick="addItem()">Add Product</button>
</div>

<!-- FILTER -->
<div class="box">
  <input id="search" placeholder="Search..." onkeyup="loadItems()">

  <select id="filter" onchange="loadItems()">
    <option value="ALL">All</option>
    <option value="ON HAND">On Hand</option>
    <option value="SOLD">Sold</option>
  </select>
</div>

<!-- CATEGORY -->
<div class="category-tabs">
  <button onclick="setCategoryFilter('ALL')">All</button>
  <button onclick="setCategoryFilter('Gadget / Console')">Gadget</button>
  <button onclick="setCategoryFilter('Phone')">Phone</button>
  <button onclick="setCategoryFilter('Appliance')">Appliance</button>
  <button onclick="setCategoryFilter('Others')">Others</button>
</div>

<!-- GRID -->
<div id="grid" class="grid"></div>

</div>

<!-- FAB -->
<button id="fabBtn" onclick="toggleAddForm()">+</button>

<!-- MODAL -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <input id="edit-id" type="hidden">
    <input id="edit-name">
    <select id="edit-category">
      <option>Gadget / Console</option>
      <option>Phone</option>
      <option>Appliance</option>
      <option>Others</option>
    </select>
    <input id="edit-purchase" type="number">
    <input id="edit-shipping" type="number">
    <input id="edit-other" type="number">
    <button onclick="saveEditItem()">Save</button>
  </div>
</div>

<script>

/* KEEP YOUR FIXED API HERE */
const API="https://script.google.com/macros/s/AKfycbzhvOEUeMnjsuTjdi6D2vFko9fEF_kkFcmhYoXA81dJkPjkr25ABfeyYSRbNwAu6lde/exec";
let activeCategory="ALL";

/* KEEP SAFE FETCH */
function safeFetch(url,o={}){
  return fetch(url,o)
  .then(r=>r.text())
  .then(t=>{try{return JSON.parse(t)}catch(e){return null}})
}

/* IMAGE */
function uploadImage(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>res(e.target.result);
    r.readAsDataURL(file);
  });
}

/* CATEGORY */
function setCategoryFilter(c){
  activeCategory=c;
  loadItems();
}

/* TOGGLE DARK */
function toggleDarkMode(){
  document.body.classList.toggle("dark");
}

/* INIT */
loadItems();
loadDashboard();

</script>

</body>
</html>
