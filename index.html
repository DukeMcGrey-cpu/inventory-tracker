<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuySell Inventory Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    
body{
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
}

.header{
  position:sticky;
  top:0;
  background:#fff;
  padding:15px;
  font-size:20px;
  font-weight:bold;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
  z-index:10;
}

.container{
  padding:15px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
}

.box{
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-top:15px;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
}

input,button,select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:14px;
}

button{
  background:#007bff;
  color:white;
  border:none;
}

.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:15px;
  margin-top:15px;
}

.item{
  background:#fff;
  padding:12px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
}

.item img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:10px;
}

.small-btn{
  padding:8px;
  margin-top:5px;
}

.profit-pos{color:green;}
.profit-neg{color:red;}

  </style>
</head>
<body>

<div class="header">📦 Inventory App</div>

<div class="container">

<div class="cards">
  <div class="card">Capital<br><b id="capital">0</b></div>
  <div class="card">Sales<br><b id="sales">0</b></div>
  <div class="card">Profit<br><b id="profit">0</b></div>
  <div class="card">On Hand<br><b id="onhand">0</b></div>
</div>

<div class="box">
  <h3>Add Product</h3>

  <input id="name" placeholder="Product Name">
  <input id="price" type="number" placeholder="Purchase Amount">
  <input id="shipping" type="number" placeholder="Shipping Fee">
  <input id="other" type="number" placeholder="Other Fees">
  <input id="image" type="file">

  <button onclick="addItem()">Add Item</button>
</div>

<div class="box">
  <input id="search" placeholder="Search..." onkeyup="loadItems()">

  <select id="filter" onchange="loadItems()">
    <option value="ALL">All</option>
    <option value="ON HAND">On Hand</option>
    <option value="SOLD">Sold</option>
  </select>
</div>

<div id="grid" class="grid"></div>
<!-- EDIT MODAL -->
<div id="editModal" style="
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.5);
justify-content:center;
align-items:center;
z-index:999;
">

  <div style="
  background:#fff;
  width:90%;
  max-width:350px;
  padding:20px;
  border-radius:12px;
  ">

    <h3>Edit Product</h3>

    <input type="hidden" id="edit-id">
    <input type="text" id="edit-name" placeholder="Product Name">
    <input type="number" id="edit-purchase" placeholder="Purchase Amount">
    <input type="number" id="edit-shipping" placeholder="Shipping Fee">
    <input type="number" id="edit-other" placeholder="Other Fee">

    <button onclick="saveEditItem()">Save Changes</button>
    <button onclick="closeEditModal()" style="background:gray;">Cancel</button>

  </div>
</div>
<script>
const API = "https://script.google.com/macros/s/AKfycbzhvOEUeMnjsuTjdi6D2vFko9fEF_kkFcmhYoXA81dJkPjkr25ABfeyYSRbNwAu6lde/exec";

/* SAFE FETCH */
function safeFetch(url, options = {}){
  return fetch(url, options)
    .then(res => res.text())
    .then(text => {
      try{
        return JSON.parse(text);
      }catch(err){
        console.error("RAW RESPONSE:", text);
        return null;
      }
    });
}

/* IMAGE TO BASE64 */
function uploadImage(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();

    reader.onload = function(event){
      resolve(event.target.result);
    };

    reader.onerror = function(error){
      reject(error);
    };

    reader.readAsDataURL(file);
  });
}

/* DASHBOARD */
function loadDashboard(){
  safeFetch(API + "?action=getDashboard").then(data => {
    if(!data) return;

    document.getElementById("capital").innerText = data.totalCapital || 0;
    document.getElementById("sales").innerText = data.totalSales || 0;
    document.getElementById("profit").innerText = data.totalProfit || 0;
    document.getElementById("onhand").innerText = data.onHand || 0;
  });
}

/* LOAD PRODUCTS */
function loadItems(){

  safeFetch(API + "?action=getItems").then(data => {

    if(!Array.isArray(data)){
      console.log("Invalid Items:", data);
      return;
    }

    let html = "";

    const searchVal = document.getElementById("search").value.toLowerCase();
    const filterVal = document.getElementById("filter").value;

    data.forEach(row => {

      const id = row[0] || "";
      const product = row[2] || "";
      const purchase = Number(row[4]) || 0;
      const shipping = Number(row[5]) || 0;
      const other = Number(row[6]) || 0;
      const capital = Number(row[7]) || 0;
      const image = row[9] || "";
      const status = row[10] || "ON HAND";
      const soldPrice = row[12] || "";
      const profit = Number(row[13]) || 0;

      if(product.toLowerCase().indexOf(searchVal) === -1) return;
      if(filterVal !== "ALL" && status !== filterVal) return;

      html += `
      <div class="item">
        ${image ? `<img src="${image}">` : ""}
        <h3>${product}</h3>

        <p>Purchase: ₱${purchase}</p>
        <p>Shipping: ₱${shipping}</p>
        <p>Other Fees: ₱${other}</p>
        <p>Total Capital: ₱${capital}</p>
        <p>Sold Price: ${soldPrice ? "₱" + soldPrice : "-"}</p>
        <p class="${profit >= 0 ? 'profit-pos' : 'profit-neg'}">Profit: ₱${profit}</p>
        <p>Status: ${status}</p>

        ${
          status === "ON HAND"
          ? `
            <input type="number" id="sold-${id}" placeholder="Sold ₱">
            <button class="small-btn" onclick="markSold('${id}')">Mark Sold</button>
          `
          : `
            <button class="small-btn" onclick="editSold('${id}')">Edit Sold</button>
          `
        }

        <button class="small-btn" onclick="openEditModal(
'${id}',
'${product}',
'${purchase}',
'${shipping}',
'${other}'
)">Edit Item</button>
        <button class="small-btn" onclick="deleteItem('${id}')">Delete</button>
      </div>
      `;
    });

    document.getElementById("grid").innerHTML = html;
  });
}

/* ADD PRODUCT */
async function addItem(){

  const file = document.getElementById("image").files[0];
  let photo = "";

  if(file){
    photo = await uploadImage(file);
  }

  safeFetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "addItem",
      productName: document.getElementById("name").value,
      purchaseAmount: Number(document.getElementById("price").value),
      shippingFee: Number(document.getElementById("shipping").value),
      otherFee: Number(document.getElementById("other").value),
      quantity: 1,
      photoURL: photo
    })
  }).then(() => {

    document.getElementById("name").value = "";
    document.getElementById("price").value = "";
    document.getElementById("shipping").value = "";
    document.getElementById("other").value = "";
    document.getElementById("image").value = "";

    loadDashboard();
    loadItems();
  });
}

/* MARK SOLD */
function markSold(id){

  const soldAmount = Number(document.getElementById("sold-" + id).value);

  if(!soldAmount){
    alert("Enter sold amount");
    return;
  }

  safeFetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"markSold",
      id:id,
      soldAmount:soldAmount
    })
  }).then(()=>{
    loadDashboard();
    loadItems();
  });
}

/* EDIT SOLD */
function editSold(id){

  const newSold = prompt("Enter new sold amount:");

  if(!newSold) return;

  safeFetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"editSold",
      id:id,
      soldAmount:Number(newSold)
    })
  }).then(()=>{
    loadDashboard();
    loadItems();
  });
}

/* EDIT PRODUCT */
function editItem(id){

  const newName = prompt("Enter new product name:");
  const newPurchase = prompt("Enter new purchase amount:");

  if(!newName || !newPurchase) return;

  safeFetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"editItem",
      id:id,
      productName:newName,
      purchaseAmount:Number(newPurchase)
    })
  }).then(()=>{
    loadDashboard();
    loadItems();
  });
}

/* DELETE PRODUCT */
function deleteItem(id){

  if(!confirm("Delete this item?")) return;

  safeFetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"deleteItem",
      id:id
    })
  }).then(()=>{
    loadDashboard();
    loadItems();
  });
}
function openEditModal(id,name,purchase,shipping,other){
  document.getElementById("edit-id").value = id;
  document.getElementById("edit-name").value = name;
  document.getElementById("edit-purchase").value = purchase;
  document.getElementById("edit-shipping").value = shipping;
  document.getElementById("edit-other").value = other;

  document.getElementById("editModal").style.display = "flex";
}

function closeEditModal(){
  document.getElementById("editModal").style.display = "none";
}

function saveEditItem(){

  const id = document.getElementById("edit-id").value;
  const name = document.getElementById("edit-name").value;
  const purchase = Number(document.getElementById("edit-purchase").value);
  const shipping = Number(document.getElementById("edit-shipping").value);
  const other = Number(document.getElementById("edit-other").value);

  safeFetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"editItem",
      id:id,
      productName:name,
      purchaseAmount:purchase,
      shippingFee:shipping,
      otherFee:other
    })
  }).then(()=>{
    closeEditModal();
    loadDashboard();
    loadItems();
  });
}
/* INITIAL LOAD */
loadDashboard();
loadItems();
</script>
</body>
</html>
