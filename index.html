<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuySell Inventory Pro</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    * { box-sizing: border-box; font-family: Arial, sans-serif; }

    body { margin: 0; background: #f4f5f7; transition: .3s; color: #111; }

    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 20px;
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
      position: sticky; top: 0; z-index: 99;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .app-icon { width: 46px; height: 46px; border-radius: 14px; background: #ececec; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    .app-text h2, .app-text p { margin: 0; }
    .app-text h2 { font-size: 16px; }
    .app-text p { font-size: 11px; color: gray; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }

    .container { padding: 12px 15px; max-width: 1200px; margin: auto; }

    .cards {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px; margin: 12px 0;
    }
    .card { background: #fff; padding: 14px 10px; border-radius: 16px; box-shadow: 0 4px 14px rgba(0,0,0,.06); text-align: center; transition: .25s; }
    .card:hover { transform: translateY(-3px); }
    .card small { display: block; color: gray; margin: 4px 0; font-size: 11px; }
    .card h3 { margin: 0; font-size: 16px; }

    .box, .modal-content { background: #fff; padding: 15px; border-radius: 16px; box-shadow: 0 4px 14px rgba(0,0,0,.06); margin-top: 12px; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-grid button { grid-column: span 2; }

    input, select, button { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 14px; outline: none; transition: border .2s; }
    input:focus, select:focus { border-color: #111; }
    button { border: none; background: #111; color: #fff; cursor: pointer; font-weight: 600; transition: opacity .2s; }
    button:hover { opacity: .85; }

    .search-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center; }

    .export-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .export-btn { width: auto; padding: 8px 16px; border-radius: 10px; font-size: 13px; background: #fff; color: #111; border: 1px solid #ddd; font-weight: 600; }
    .export-btn:hover { background: #111; color: #fff; border-color: #111; }

    .category-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
    .category-tabs button { width: auto; padding: 7px 14px; border-radius: 50px; background: #fff; color: #111; border: 1px solid #ddd; font-size: 13px; font-weight: 500; }
    .category-tabs button.active { background: #111; color: #fff; border-color: #111; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; margin-top: 12px; }

    .item { background: #fff; border-radius: 18px; overflow: hidden; box-shadow: 0 6px 18px rgba(0,0,0,.07); position: relative; transition: .25s; }
    .item:hover { transform: translateY(-4px); box-shadow: 0 12px 28px rgba(0,0,0,.1); }
    .item img { width: 100%; height: 200px; object-fit: cover; }
    .item-no-img { width: 100%; height: 120px; background: #f4f5f7; display: flex; align-items: center; justify-content: center; font-size: 40px; }
    .item-body { padding: 14px; }
    .item-body h3 { margin: 0 0 4px; font-size: 15px; }
    .item-body p { margin: 3px 0; font-size: 13px; color: #555; }

    .status-pill { position: absolute; top: 10px; right: 10px; padding: 5px 11px; border-radius: 30px; font-size: 11px; font-weight: 700; background: #111; color: #fff; }
    .status-pill.sold { background: #22c55e; }

    .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .full-btn { grid-column: span 2; }

    #fabBtn { position: fixed; bottom: 22px; right: 22px; width: 58px; height: 58px; border-radius: 50%; font-size: 28px; z-index: 999; box-shadow: 0 8px 20px rgba(0,0,0,.25); }

    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); justify-content: center; align-items: center; z-index: 9999; padding: 15px; }
    .modal-content { width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    .modal-content h3 { margin: 0 0 5px; }

    .chart-box { background: #fff; padding: 15px; border-radius: 16px; box-shadow: 0 4px 14px rgba(0,0,0,.06); margin-top: 12px; }
    .chart-box h3 { margin: 0 0 12px; font-size: 15px; }
    .chart-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
    .chart-tab { width: auto; padding: 6px 14px; border-radius: 8px; font-size: 12px; background: #f4f5f7; color: #111; border: 1px solid #ddd; }
    .chart-tab.active { background: #111; color: #fff; border-color: #111; }

    .spinner-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,.6); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 9998; }
    .spinner-overlay.show { display: flex; }
    .spinner { width: 44px; height: 44px; border: 4px solid #ddd; border-top-color: #111; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .switch { position: relative; width: 46px; height: 24px; display: inline-block; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #ccc; border-radius: 30px; cursor: pointer; transition: .3s; }
    .slider:before { content: ""; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .3s; }
    input:checked + .slider { background: #111; }
    input:checked + .slider:before { transform: translateX(22px); }

    .toast { position: fixed; top: 20px; right: 20px; background: #111; color: #fff; padding: 12px 18px; border-radius: 12px; display: none; z-index: 10000; font-size: 13px; font-weight: 500; box-shadow: 0 4px 16px rgba(0,0,0,.2); }

    .empty-state { text-align: center; padding: 50px 20px; color: #aaa; grid-column: 1/-1; }
    .empty-state p { font-size: 14px; margin-top: 8px; }

    body.dark { background: #111; color: #eee; }
    body.dark .topbar, body.dark .card, body.dark .box, body.dark .modal-content, body.dark .item, body.dark .chart-box { background: #1d1d1d; color: #eee; box-shadow: none; }
    body.dark input, body.dark select { background: #2a2a2a; color: #eee; border-color: #444; }
    body.dark .app-icon { background: #2a2a2a; }
    body.dark .category-tabs button, body.dark .chart-tab { background: #2a2a2a; color: #eee; border-color: #444; }
    body.dark .category-tabs button.active, body.dark .chart-tab.active { background: #fff; color: #111; }
    body.dark .export-btn { background: #2a2a2a; color: #eee; border-color: #444; }
    body.dark .export-btn:hover { background: #fff; color: #111; }
    body.dark .item-no-img { background: #2a2a2a; }
    body.dark .spinner-overlay { background: rgba(0,0,0,.6); }
    body.dark .spinner { border-color: #444; border-top-color: #fff; }

    @media(max-width: 600px) {
      .cards { grid-template-columns: repeat(3, 1fr); }
      .form-grid { grid-template-columns: 1fr; }
      .form-grid button { grid-column: span 1; }
      .grid { grid-template-columns: 1fr; }
      .search-row { grid-template-columns: 1fr; }
      .app-text h2 { font-size: 14px; }
      .topbar { padding: 10px 14px; }
    }
    @media(max-width: 400px) {
      .cards { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

<body>

  <div class="toast" id="toast"></div>
  <div class="spinner-overlay" id="spinnerOverlay"><div class="spinner"></div></div>

  <div class="topbar">
    <div class="topbar-left">
      <div class="app-icon">📦</div>
      <div class="app-text">
        <h2>BuySell Inventory Pro</h2>
        <p>Ultra Premium Inventory Dashboard</p>
      </div>
    </div>
    <div class="topbar-right">
      <label class="switch">
        <input type="checkbox" onchange="toggleDarkMode()" id="darkSwitch">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="container">

    <div class="cards">
      <div class="card">💸<small>Capital</small><h3 id="capital">₱0</h3></div>
      <div class="card">💰<small>Sales</small><h3 id="sales">₱0</h3></div>
      <div class="card">📈<small>Profit</small><h3 id="profit">₱0</h3></div>
      <div class="card">📦<small>On Hand</small><h3 id="onhand">0</h3></div>
      <div class="card">✅<small>Sold</small><h3 id="sold">0</h3></div>
    </div>

    <div id="addFormBox" class="box" style="display:none;">
      <div class="form-grid">
        <input id="nameInput" placeholder="Product Name">
        <select id="categoryInput">
          <option>Gadget / Console</option>
          <option>Phone</option>
          <option>Appliance</option>
          <option>Others</option>
        </select>
        <input id="priceInput" type="number" placeholder="Purchase Amount">
        <input id="shippingInput" type="number" placeholder="Shipping Fee">
        <input id="otherInput" type="number" placeholder="Other Fee">
        <input id="imageInput" type="file" accept="image/*">
        <button onclick="addItem()">Add Product</button>
      </div>
    </div>

    <div class="box">
      <div class="search-row">
        <input id="search" placeholder="🔍 Search product..." onkeyup="renderItems()">
        <select id="filter" onchange="renderItems()">
          <option value="ALL">All Status</option>
          <option value="ON HAND">On Hand</option>
          <option value="SOLD">Sold</option>
        </select>
      </div>
      <div class="export-row">
        <button class="export-btn" onclick="exportCSV()">📄 Export CSV</button>
        <button class="export-btn" onclick="exportPDF()">🖨️ Export PDF</button>
      </div>
    </div>

    <div class="category-tabs">
      <button class="active" onclick="setCategoryFilter('ALL', this)">All</button>
      <button onclick="setCategoryFilter('Gadget / Console', this)">Gadget / Console</button>
      <button onclick="setCategoryFilter('Phone', this)">Phone</button>
      <button onclick="setCategoryFilter('Appliance', this)">Appliance</button>
      <button onclick="setCategoryFilter('Others', this)">Others</button>
    </div>

    <div id="grid" class="grid"></div>

    <div class="chart-box">
      <h3>📊 Sales & Profit History</h3>
      <div class="chart-tabs">
        <button class="chart-tab active" onclick="switchChart('bar', this)">Bar</button>
        <button class="chart-tab" onclick="switchChart('line', this)">Line</button>
      </div>
      <canvas id="salesChart" height="100"></canvas>
    </div>

  </div>

  <button onclick="toggleAddForm()" id="fabBtn">+</button>

  <div id="editModal" class="modal">
    <div class="modal-content">
      <h3>✏️ Edit Product</h3>
      <input type="hidden" id="edit-id">
      <input id="edit-name" placeholder="Product Name">
      <select id="edit-category">
        <option>Gadget / Console</option>
        <option>Phone</option>
        <option>Appliance</option>
        <option>Others</option>
      </select>
      <input id="edit-purchase" type="number" placeholder="Purchase Amount">
      <input id="edit-shipping" type="number" placeholder="Shipping Fee">
      <input id="edit-other" type="number" placeholder="Other Fee">
      <input id="edit-image" type="file" accept="image/*">
      <small style="color:gray;margin-top:-4px;">Leave image empty to keep existing photo</small>
      <button onclick="saveEditItem()">Save Changes</button>
      <button onclick="closeEditModal()" style="background:#666;margin-top:4px;">Cancel</button>
    </div>
  </div>

  <script>
    const API = 'https://script.google.com/macros/s/AKfycbzhvOEUeMnjsuTjdi6D2vFko9fEF_kkFcmhYoXA81dJkPjkr25ABfeyYSRbNwAu6lde/exec';
    const IMGBB_KEY = 'c1047f546534cb119c255afbd588a63f'; // 🔑 Replace with your ImgBB key

    let activeCategory = 'ALL';
    let cachedItems = [];
    let cacheTimestamp = 0;
    const CACHE_TTL = 30000; // 30 seconds
    let salesChart = null;
    let currentChartType = 'bar';

    // ── TOAST ──
    function toast(msg) {
      const t = document.getElementById('toast');
      t.innerText = msg;
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 2500);
    }

    // ── SPINNER ──
    function showSpinner() { document.getElementById('spinnerOverlay').classList.add('show'); }
    function hideSpinner() { document.getElementById('spinnerOverlay').classList.remove('show'); }

    // ── FETCH ──
    function safeFetch(url, o = {}) {
      return fetch(url, o)
        .then(r => r.text())
        .then(t => {
          try { return JSON.parse(t); }
          catch (e) { return null; }
        });
    }

    // ── IMAGE UPLOAD (ImgBB) ──
    function uploadImage(file) {
      return new Promise((res) => {
        const timeout = setTimeout(() => { toast('Image skipped, adding product...'); res(''); }, 10000);
        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            const base64 = e.target.result.split(',')[1];
            const formData = new FormData();
            formData.append('image', base64);
            const response = await fetch('https://api.imgbb.com/1/upload?key=' + IMGBB_KEY, {
              method: 'POST', body: formData
            });
            const data = await response.json();
            clearTimeout(timeout);
            res(data.success ? data.data.url : '');
          } catch(e) { clearTimeout(timeout); res(''); }
        };
        reader.onerror = () => { clearTimeout(timeout); res(''); };
        reader.readAsDataURL(file);
      });
    }

    // ── CATEGORY FILTER ──
    function setCategoryFilter(cat, btn) {
      activeCategory = cat;
      document.querySelectorAll('.category-tabs button').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      renderItems();
    }

    // ── LOAD DASHBOARD ──
    function loadDashboard() {
      safeFetch(API + '?action=getDashboard').then(d => {
        if (!d) return;
        document.getElementById('capital').innerText = '₱' + (d.totalCapital || 0).toLocaleString();
        document.getElementById('sales').innerText = '₱' + (d.totalSales || 0).toLocaleString();
        document.getElementById('profit').innerText = '₱' + (d.totalProfit || 0).toLocaleString();
        document.getElementById('onhand').innerText = d.onHand || 0;
        document.getElementById('sold').innerText = d.soldCount || 0;
      });
    }

    // ── LOAD ITEMS (with cache) ──
    function loadItems(forceRefresh = false) {
      const now = Date.now();
      if (!forceRefresh && cachedItems.length > 0 && (now - cacheTimestamp) < CACHE_TTL) {
        renderItems();
        return;
      }
      showSpinner();
      safeFetch(API + '?action=getItems').then(data => {
        hideSpinner();
        if (!Array.isArray(data)) return;
        cachedItems = data;
        cacheTimestamp = Date.now();
        renderItems();
        buildChart(data);
      }).catch(() => hideSpinner());
    }

    // ── RENDER ITEMS (from cache) ──
    function renderItems() {
      const s = document.getElementById('search').value.toLowerCase();
      const f = document.getElementById('filter').value;
      const grid = document.getElementById('grid');

      const filtered = cachedItems.filter(r => {
        const name = (r[2] || '').toLowerCase();
        const cat = r[3] || '';
        const status = r[10] || 'ON HAND';
        if (name.indexOf(s) === -1) return false;
        if (f !== 'ALL' && status !== f) return false;
        if (activeCategory !== 'ALL' && cat !== activeCategory) return false;
        return true;
      });

      if (filtered.length === 0) {
        grid.innerHTML = `<div class='empty-state'><div style='font-size:48px'>📭</div><p>No products found</p></div>`;
        return;
      }

      grid.innerHTML = filtered.map(r => {
        const id = r[0] || '';
        const p = r[2] || '';
        const c = r[3] || '';
        const pu = +r[4] || 0;
        const sh = +r[5] || 0;
        const o  = +r[6] || 0;
        const cap = +r[7] || 0;
        const img = r[9] || '';
        const st  = r[10] || 'ON HAND';
        const soldp = +r[12] || 0;
        const pro = +r[13] || 0;
        const safeP = p.replace(/'/g, "\\'");

        return `
          <div class='item'>
            <span class='status-pill ${st === "SOLD" ? "sold" : ""}'>${st}</span>
            ${img ? `<img src='${img}' loading='lazy'>` : `<div class='item-no-img'>📦</div>`}
            <div class='item-body'>
              <h3>${p}</h3>
              <p style='color:#888'>${c}</p>
              <p>Capital: <strong>₱${cap.toLocaleString()}</strong></p>
              <p>Sold: <strong>${soldp ? '₱' + soldp.toLocaleString() : '-'}</strong></p>
              <p style='color:${pro >= 0 ? "#22c55e" : "#ef4444"}'>Profit: <strong>₱${pro.toLocaleString()}</strong></p>
              ${st === 'ON HAND'
                ? `<input id='sold-${id}' type='number' placeholder='Sold Amount' style='margin-top:8px'>
                   <button class='full-btn' style='margin-top:6px' onclick="markSold('${id}')">Mark Sold</button>`
                : `<button class='full-btn' style='margin-top:8px' onclick="editSold('${id}')">Edit Sold</button>`
              }
              <div class='action-row'>
                <button onclick="openEditModal('${id}','${safeP}','${c}','${pu}','${sh}','${o}')">✏️ Edit</button>
                <button onclick="deleteItem('${id}')" style='background:#ef4444'>🗑️ Delete</button>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    // ── ADD ITEM ──
    async function addItem() {
      const nameVal = document.getElementById('nameInput').value.trim();
      if (!nameVal) return toast('Enter product name');

      const categoryVal = document.getElementById('categoryInput').value;
      const priceVal    = document.getElementById('priceInput').value;
      const shippingVal = document.getElementById('shippingInput').value;
      const otherVal    = document.getElementById('otherInput').value;
      const imageEl     = document.getElementById('imageInput');
      const file        = imageEl.files[0];

      toast('Adding product...');
      showSpinner();

      const result = await safeFetch(API, {
        method: 'POST',
        body: JSON.stringify({
          action: 'addItem',
          productName: nameVal,
          category: categoryVal,
          purchaseAmount: +priceVal,
          shippingFee: +shippingVal,
          otherFee: +otherVal,
          quantity: 1,
          photoURL: ''
        })
      });

      if (!result || result.status !== 'success') {
        hideSpinner();
        return toast('Failed to save product. Try again.');
      }

      if (file) {
        toast('Uploading image...');
        try {
          const photo = await uploadImage(file);
          if (photo) {
            await safeFetch(API, {
              method: 'POST',
              body: JSON.stringify({ action: 'uploadImage', id: result.id, photoURL: photo })
            });
          }
        } catch(e) {}
      }

      document.getElementById('nameInput').value    = '';
      document.getElementById('priceInput').value   = '';
      document.getElementById('shippingInput').value = '';
      document.getElementById('otherInput').value   = '';
      imageEl.value = '';

      hideSpinner();
      toast('Product Added! ✅');
      cachedItems = [];
      loadDashboard();
      loadItems(true);
      toggleAddForm(true);
    }

    // ── MARK SOLD ──
    async function markSold(id) {
      const amt = +document.getElementById('sold-' + id).value;
      if (!amt) return toast('Enter sold amount');
      showSpinner();
      await safeFetch(API, { method: 'POST', body: JSON.stringify({ action: 'markSold', id, soldAmount: amt }) });
      hideSpinner();
      toast('Marked as Sold ✅');
      cachedItems = [];
      loadDashboard();
      loadItems(true);
    }

    // ── EDIT SOLD ──
    async function editSold(id) {
      const amt = prompt('Enter new sold amount');
      if (!amt) return;
      showSpinner();
      await safeFetch(API, { method: 'POST', body: JSON.stringify({ action: 'editSold', id, soldAmount: +amt }) });
      hideSpinner();
      toast('Sold Updated ✅');
      cachedItems = [];
      loadDashboard();
      loadItems(true);
    }

    // ── DELETE ──
    async function deleteItem(id) {
      if (!confirm('Delete this item?')) return;
      showSpinner();
      await safeFetch(API, { method: 'POST', body: JSON.stringify({ action: 'deleteItem', id }) });
      hideSpinner();
      toast('Item Deleted 🗑️');
      cachedItems = [];
      loadDashboard();
      loadItems(true);
    }

    // ── EDIT MODAL ──
    function openEditModal(id, n, c, p, s, o) {
      document.getElementById('edit-id').value       = id;
      document.getElementById('edit-name').value     = n;
      document.getElementById('edit-category').value = c;
      document.getElementById('edit-purchase').value = p;
      document.getElementById('edit-shipping').value = s;
      document.getElementById('edit-other').value    = o;
      document.getElementById('edit-image').value    = '';
      document.getElementById('editModal').style.display = 'flex';
    }

    function closeEditModal() {
      document.getElementById('editModal').style.display = 'none';
    }

    async function saveEditItem() {
      showSpinner();
      const id      = document.getElementById('edit-id').value;
      const imageEl = document.getElementById('edit-image');
      const file    = imageEl.files[0];

      await safeFetch(API, {
        method: 'POST',
        body: JSON.stringify({
          action: 'editItem',
          id,
          productName:    document.getElementById('edit-name').value,
          category:       document.getElementById('edit-category').value,
          purchaseAmount: +document.getElementById('edit-purchase').value,
          shippingFee:    +document.getElementById('edit-shipping').value,
          otherFee:       +document.getElementById('edit-other').value
        })
      });

      if (file) {
        toast('Uploading image...');
        try {
          const photo = await uploadImage(file);
          if (photo) {
            await safeFetch(API, { method: 'POST', body: JSON.stringify({ action: 'uploadImage', id, photoURL: photo }) });
          }
        } catch(e) {}
      }

      hideSpinner();
      toast('Item Updated ✅');
      closeEditModal();
      cachedItems = [];
      loadDashboard();
      loadItems(true);
    }

    // ── CHART ──
    function buildChart(data) {
      const soldItems = data.filter(r => r[10] === 'SOLD' && r[11]);
      const grouped = {};

      soldItems.forEach(r => {
        const date = new Date(r[11]);
        if (isNaN(date)) return;
        const key = date.toLocaleString('default', { month: 'short', year: '2-digit' });
        if (!grouped[key]) grouped[key] = { sales: 0, profit: 0 };
        grouped[key].sales  += +r[12] || 0;
        grouped[key].profit += +r[13] || 0;
      });

      const labels     = Object.keys(grouped);
      const salesData  = labels.map(k => grouped[k].sales);
      const profitData = labels.map(k => grouped[k].profit);
      const isDark     = document.body.classList.contains('dark');
      const gridColor  = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
      const labelColor = isDark ? '#aaa' : '#666';

      const ctx = document.getElementById('salesChart').getContext('2d');
      if (salesChart) salesChart.destroy();

      salesChart = new Chart(ctx, {
        type: currentChartType,
        data: {
          labels: labels.length ? labels : ['No sales yet'],
          datasets: [
            { label: 'Sales (₱)', data: salesData.length ? salesData : [0], backgroundColor: 'rgba(34,197,94,0.15)', borderColor: '#22c55e', borderWidth: 2, tension: 0.4, fill: true, pointBackgroundColor: '#22c55e' },
            { label: 'Profit (₱)', data: profitData.length ? profitData : [0], backgroundColor: 'rgba(59,130,246,0.15)', borderColor: '#3b82f6', borderWidth: 2, tension: 0.4, fill: true, pointBackgroundColor: '#3b82f6' }
          ]
        },
        options: {
          responsive: true,
          plugins: { legend: { labels: { color: labelColor } } },
          scales: {
            x: { ticks: { color: labelColor }, grid: { color: gridColor } },
            y: { ticks: { color: labelColor }, grid: { color: gridColor } }
          }
        }
      });
    }

    function switchChart(type, btn) {
      currentChartType = type;
      document.querySelectorAll('.chart-tab').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      buildChart(cachedItems);
    }

    // ── EXPORT CSV ──
    function exportCSV() {
      if (!cachedItems.length) return toast('No data to export');
      const headers = ['ID','Date','Product','Category','Purchase','Shipping','Other','Capital','Qty','Image','Status','Sold Date','Sold Amount','Profit'];
      const rows = cachedItems.map(r => r.map(v => `"${v}"`).join(','));
      const csv  = [headers.join(','), ...rows].join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const a    = document.createElement('a');
      a.href     = URL.createObjectURL(blob);
      a.download = 'inventory_' + new Date().toISOString().slice(0,10) + '.csv';
      a.click();
      toast('CSV Exported 📄');
    }

    // ── EXPORT PDF ──
    function exportPDF() {
      if (!cachedItems.length) return toast('No data to export');
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'landscape' });

      doc.setFontSize(16);
      doc.text('BuySell Inventory Report', 14, 16);
      doc.setFontSize(10);
      doc.text('Generated: ' + new Date().toLocaleString(), 14, 23);

      const colWidths = [25, 60, 35, 28, 25, 28, 28];
      const colX = [14];
      colWidths.forEach((w, i) => colX.push(colX[i] + w));
      const totalW = colWidths.reduce((a, b) => a + b, 0);
      const headers = ['ID', 'Product', 'Category', 'Capital', 'Status', 'Sold', 'Profit'];

      let y = 32;
      doc.setFillColor(30, 30, 30);
      doc.rect(14, y, totalW, 8, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(9);
      headers.forEach((h, i) => doc.text(h, colX[i] + 2, y + 5.5));

      doc.setTextColor(0, 0, 0);
      cachedItems.forEach((r, ri) => {
        y += 8;
        if (y > 190) { doc.addPage(); y = 20; }
        if (ri % 2 === 0) { doc.setFillColor(245, 245, 245); doc.rect(14, y, totalW, 8, 'F'); }
        const row = [r[0]||'', r[2]||'', r[3]||'', '₱'+(+r[7]||0).toLocaleString(), r[10]||'ON HAND', r[12]?'₱'+(+r[12]).toLocaleString():'-', '₱'+(+r[13]||0).toLocaleString()];
        row.forEach((cell, i) => doc.text(String(cell).slice(0,20), colX[i] + 2, y + 5.5));
      });

      doc.save('inventory_' + new Date().toISOString().slice(0,10) + '.pdf');
      toast('PDF Exported 🖨️');
    }

    // ── DARK MODE ──
    function toggleDarkMode() {
      document.body.classList.toggle('dark');
      const d = document.body.classList.contains('dark');
      document.getElementById('darkSwitch').checked = d;
      localStorage.setItem('darkmode', d ? 'on' : 'off');
      if (cachedItems.length) buildChart(cachedItems);
    }

    function loadDarkMode() {
      if (localStorage.getItem('darkmode') === 'on') {
        document.body.classList.add('dark');
        document.getElementById('darkSwitch').checked = true;
      }
    }

    // ── ADD FORM TOGGLE ──
    function toggleAddForm(force = false) {
      const box = document.getElementById('addFormBox');
      if (force) { box.style.display = 'none'; return; }
      box.style.display = box.style.display === 'none' ? 'block' : 'none';
    }

    // ── INIT ──
    loadDarkMode();
    loadDashboard();
    loadItems(true);
  </script>

</body>
</html>
