<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuySell Inventory Pro V4</title>

<style>
body{margin:0;font-family:Arial;background:#f4f5f7}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:15px;background:#fff;position:sticky;top:0;box-shadow:0 4px 10px rgba(0,0,0,.1)}
.container{padding:15px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.card{background:#fff;padding:15px;border-radius:12px;text-align:center}
.box{background:#fff;padding:15px;border-radius:12px;margin-top:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;margin-top:15px}
.item{background:#fff;border-radius:12px;overflow:hidden}
.item img{width:100%;height:200px;object-fit:cover}
.item-body{padding:10px}
button{padding:10px;width:100%;margin-top:5px;cursor:pointer}
</style>
</head>

<body>

<div class="topbar">
  <h3>📦 Inventory V4</h3>
</div>

<div class="container">

<div class="cards">
  <div class="card">Capital <div id="capital">0</div></div>
  <div class="card">Sales <div id="sales">0</div></div>
  <div class="card">Profit <div id="profit">0</div></div>
  <div class="card">On Hand <div id="onhand">0</div></div>
  <div class="card">Sold <div id="sold">0</div></div>
</div>

<div class="box">
  <input id="name" placeholder="Product Name">
  <select id="category">
    <option>Gadget / Console</option>
    <option>Phone</option>
    <option>Appliance</option>
    <option>Others</option>
  </select>

  <input id="price" type="number" placeholder="Purchase">
  <input id="shipping" type="number" placeholder="Shipping">
  <input id="other" type="number" placeholder="Other">
  <input id="image" type="file">

  <button onclick="addItem()">Add Product</button>
</div>

<div id="grid" class="grid"></div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzhvOEUeMnjsuTjdi6D2vFko9fEF_kkFcmhYoXA81dJkPjkr25ABfeyYSRbNwAu6lde/exec";
let items = [];

/* SAFE FETCH */
function safeFetch(url, options){
  return fetch(url, options)
    .then(r => r.text())
    .then(t => {
      try { return JSON.parse(t); }
      catch(e){ console.log(t); return null; }
    });
}

/* IMAGE COMPRESS */
function uploadImage(file){
  return new Promise((resolve)=>{
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.readAsDataURL(file);
  });
}

/* ADD ITEM */
async function addItem(){

  const file = document.getElementById("image").files[0];
  let photo = "";

  if(file){
    photo = await uploadImage(file);
  }

  await safeFetch(API, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      action:"addItem",
      productName: document.getElementById("name").value,
      category: document.getElementById("category").value,
      purchaseAmount: Number(document.getElementById("price").value),
      shippingFee: Number(document.getElementById("shipping").value),
      otherFee: Number(document.getElementById("other").value),
      photoURL: photo
    })
  });

  loadItems();
  loadDashboard();
}

/* LOAD ITEMS */
function loadItems(){
  safeFetch(API+"?action=getItems").then(data=>{
    if(!Array.isArray(data)) return;

    items = data;

    let html = "";

    data.forEach(r=>{
      const id = r[0];
      const name = r[2];
      const category = r[3];
      const image = r[9];
      const status = r[10];
      const capital = r[7];
      const sold = r[12];
      const profit = r[13];

      html += `
      <div class="item">
        ${image ? `<img src="${image}">` : ""}
        <div class="item-body">
          <h3>${name}</h3>
          <p>${category}</p>
          <p>Capital: ${capital}</p>
          <p>Sold: ${sold || "-"}</p>
          <p>Profit: ${profit}</p>
          <p>Status: ${status}</p>
        </div>
      </div>
      `;
    });

    document.getElementById("grid").innerHTML = html;
  });
}

/* DASHBOARD */
function loadDashboard(){
  safeFetch(API+"?action=getDashboard").then(d=>{
    if(!d) return;
    capital.innerText = d.totalCapital;
    sales.innerText = d.totalSales;
    profit.innerText = d.totalProfit;
    onhand.innerText = d.onHand;
    sold.innerText = d.soldCount;
  });
}

loadItems();
loadDashboard();
</script>

</body>
</html>
