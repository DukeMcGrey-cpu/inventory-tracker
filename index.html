<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuySell Inventory Pro V4.5</title>

<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{margin:0;background:#f4f5f7;color:#111;transition:.3s}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);box-shadow:0 4px 20px rgba(0,0,0,.08);position:sticky;top:0;z-index:99}
.topbar-left{display:flex;align-items:center;gap:12px}
.app-icon{width:52px;height:52px;border-radius:16px;background:#ececec;display:flex;align-items:center;justify-content:center;font-size:28px}
.app-text h2,.app-text p{margin:0}
.app-text p{font-size:12px;color:gray}
.container{padding:15px;max-width:1200px;margin:auto}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin:15px 0}
.card{background:#fff;padding:18px;border-radius:18px;box-shadow:0 6px 18px rgba(0,0,0,.06);text-align:center}
.card small{display:block;color:gray;margin:6px 0}
.box,.modal-content{background:#fff;padding:15px;border-radius:18px;box-shadow:0 6px 18px rgba(0,0,0,.06);margin-top:15px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid button{grid-column:span 2}
input,select,button{width:100%;padding:11px;border-radius:10px;border:1px solid #ccc;font-size:14px}
button{border:none;background:#111;color:#fff;cursor:pointer}
.category-tabs{display:flex;gap:8px;flex-wrap:wrap;margin:15px 0}
.category-tabs button{width:auto;padding:8px 14px;border-radius:50px;background:#fff;color:#111;border:1px solid #ddd}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;margin-top:15px}
.item{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 8px 20px rgba(0,0,0,.07);position:relative}
.item img{width:100%;height:220px;object-fit:cover}
.item-body{padding:15px}
.status-pill{position:absolute;top:12px;right:12px;padding:6px 12px;border-radius:30px;font-size:12px;background:#111;color:#fff}
.action-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.full-btn{grid-column:span 2}
#fabBtn{position:fixed;bottom:22px;right:22px;width:62px;height:62px;border-radius:50%;font-size:30px;z-index:999;box-shadow:0 8px 18px rgba(0,0,0,.25)}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);justify-content:center;align-items:center;z-index:9999}
.switch{position:relative;width:50px;height:24px;display:inline-block}
.switch input{opacity:0}
.slider{position:absolute;inset:0;background:#ccc;border-radius:30px;cursor:pointer}
.slider:before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked + .slider{background:#111}
input:checked + .slider:before{transform:translateX(26px)}
.toast{position:fixed;top:20px;right:20px;background:#111;color:#fff;padding:12px 18px;border-radius:12px;display:none;z-index:10000}
body.dark{background:#111;color:#fff}
body.dark .topbar,body.dark .card,body.dark .box,body.dark .modal-content,body.dark .item{background:#1d1d1d;color:#fff;box-shadow:none}
body.dark input,body.dark select{background:#2a2a2a;color:#fff;border:1px solid #555}
body.dark .app-icon{background:#2a2a2a}
body.dark .category-tabs button{background:#2a2a2a;color:#fff;border:1px solid #444}
@media(max-width:768px){
.form-grid{grid-template-columns:1fr}
.form-grid button{grid-column:span 1}
.grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="toast" id="toast"></div>

<div class="topbar">
<div class="topbar-left">
<div class="app-icon">📦</div>
<div class="app-text">
<h2>BuySell Inventory Pro</h2>
<p>Enterprise Mobile Dashboard</p>
</div>
</div>

<label class="switch">
<input type="checkbox" onchange="toggleDarkMode()" id="darkSwitch">
<span class="slider"></span>
</label>
</div>

<div class="container">

<div class="cards">
<div class="card">💸<small>Total Capital</small><h3 id="capital">₱0</h3></div>
<div class="card">💰<small>Total Sales</small><h3 id="sales">₱0</h3></div>
<div class="card">📈<small>Total Profit</small><h3 id="profit">₱0</h3></div>
<div class="card">📦<small>On Hand</small><h3 id="onhand">0</h3></div>
<div class="card">✅<small>Sold</small><h3 id="sold">0</h3></div>
</div>

<div id="addFormBox" class="box" style="display:none;">
<div class="form-grid">
<input id="name" placeholder="Product Name">
<select id="category">
<option>Gadget / Console</option>
<option>Phone</option>
<option>Appliance</option>
<option>Others</option>
</select>
<input id="price" type="number" placeholder="Purchase Amount">
<input id="shipping" type="number" placeholder="Shipping Fee">
<input id="other" type="number" placeholder="Other Fee">
<input id="image" type="file" accept="image/*">
<button onclick="addItem()">Add Product</button>
</div>
</div>

<div class="box">
<input id="search" placeholder="Search product..." onkeyup="loadItems()">
<select id="filter" onchange="loadItems()">
<option value="ALL">All Status</option>
<option value="ON HAND">On Hand</option>
<option value="SOLD">Sold</option>
</select>
</div>

<div class="category-tabs">
<button onclick="setCategoryFilter('ALL')">All</button>
<button onclick="setCategoryFilter('Gadget / Console')">Gadget / Console</button>
<button onclick="setCategoryFilter('Phone')">Phone</button>
<button onclick="setCategoryFilter('Appliance')">Appliance</button>
<button onclick="setCategoryFilter('Others')">Others</button>
</div>

<div id="grid" class="grid"></div>
</div>

<button onclick="toggleAddForm()" id="fabBtn">+</button>

<div id="editModal" class="modal">
<div class="modal-content">
<input type="hidden" id="edit-id">
<input id="edit-name" placeholder="Product Name">
<select id="edit-category">
<option>Gadget / Console</option>
<option>Phone</option>
<option>Appliance</option>
<option>Others</option>
</select>
<input id="edit-purchase" type="number" placeholder="Purchase Amount">
<input id="edit-shipping" type="number" placeholder="Shipping Fee">
<input id="edit-other" type="number" placeholder="Other Fee">
<button onclick="saveEditItem()">Save Changes</button>
<button onclick="closeEditModal()">Cancel</button>
</div>
</div>

<script>
const API='https://script.google.com/macros/s/AKfycbzhvOEUeMnjsuTjdi6D2vFko9fEF_kkFcmhYoXA81dJkPjkr25ABfeyYSRbNwAu6lde/exec';
let activeCategory='ALL';

function toast(msg){
  const t=document.getElementById('toast');
  t.innerText=msg;
  t.style.display='block';
  setTimeout(()=>t.style.display='none',2000);
}

async function safeFetch(url, options = {}) {
  try{
    const response = await fetch(url,{
      ...options,
      headers:{
        "Content-Type":"text/plain;charset=utf-8"
      }
    });

    const text = await response.text();
    console.log("SERVER:", text);

    try{
      return JSON.parse(text);
    }catch(err){
      return null;
    }
  }catch(err){
    console.log(err);
    toast("Connection Error");
    return null;
  }
}

function uploadImage(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();

    reader.onload = function(e){
      const img = new Image();

      img.onload = function(){
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        let width = img.width;
        let height = img.height;
        const max = 900;

        if(width > height){
          if(width > max){
            height *= max / width;
            width = max;
          }
        }else{
          if(height > max){
            width *= max / height;
            height = max;
          }
        }

        canvas.width = width;
        canvas.height = height;
        ctx.drawImage(img,0,0,width,height);

        resolve(canvas.toDataURL("image/jpeg",0.65));
      };

      img.src = e.target.result;
    };

    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function setCategoryFilter(cat){
  activeCategory = cat;
  loadItems();
}

function loadDashboard(){
  safeFetch(API+'?action=getDashboard').then(d=>{
    if(!d) return;
    capital.innerText='₱'+(d.totalCapital||0);
    sales.innerText='₱'+(d.totalSales||0);
    profit.innerText='₱'+(d.totalProfit||0);
    onhand.innerText=d.onHand||0;
    sold.innerText=d.soldCount||0;
  });
}

function loadItems(){
  safeFetch(API+'?action=getItems').then(data=>{
    if(!Array.isArray(data)) return;

    let html='';
    const s=search.value.toLowerCase();
    const f=filter.value;

    data.forEach(r=>{
      const id=r[0]||'';
      const p=r[2]||'';
      const c=r[3]||'';
      const cap=+r[7]||0;
      const img=r[9]||'';
      const st=r[10]||'ON HAND';
      const soldp=+r[12]||0;
      const pro=+r[13]||0;

      if(p.toLowerCase().indexOf(s)===-1) return;
      if(f!=='ALL' && st!==f) return;
      if(activeCategory!=='ALL' && c!==activeCategory) return;

      html += `<div class="item">
      <span class="status-pill">${st}</span>
      ${img?`<img src="${img}">`:''}
      <div class="item-body">
      <h3>${p}</h3>
      <p>${c}</p>
      <p>Capital: ₱${cap}</p>
      <p>Sold: ${soldp?('₱'+soldp):'-'}</p>
      <p style="color:${pro>=0?'green':'red'}">Profit: ₱${pro}</p>

      ${st==='ON HAND'
      ? `<input id="sold-${id}" type="number" placeholder="Sold Amount">
         <button class="full-btn" onclick="markSold('${id}')">Mark Sold</button>`
      : `<button class="full-btn" onclick="editSold('${id}')">Edit Sold</button>`
      }

      <div class="action-row">
      <button onclick="openEditModal('${id}')">Edit</button>
      <button onclick="deleteItem('${id}')">Delete</button>
      </div>
      </div>
      </div>`;
    });

    grid.innerHTML = html;
  });
}

async function addItem(){

  if(!name.value.trim()) return toast("Enter product name");
  if(!price.value) return toast("Enter purchase amount");

  const btn = document.querySelector("#addFormBox button");
  btn.disabled = true;
  btn.innerText = "Saving...";

  try{
    let photo = "";
    const file = image.files[0];

    if(file){
      toast("Compressing image...");
      photo = await uploadImage(file);
    }

    const result = await safeFetch(API,{
      method:"POST",
      body:JSON.stringify({
        action:"addItem",
        productName:name.value,
        category:category.value,
        purchaseAmount:+price.value,
        shippingFee:+shipping.value,
        otherFee:+other.value,
        quantity:1,
        photoURL:photo
      })
    });

    console.log(result);

    if(!result || result.status!=="success"){
      toast("Add failed");
      return;
    }

    name.value='';
    price.value='';
    shipping.value='';
    other.value='';
    image.value='';

    toast("Product Added");
    loadDashboard();
    loadItems();
    toggleAddForm(true);

  }catch(err){
    console.log(err);
    toast("Add failed");
  }

  btn.disabled = false;
  btn.innerText = "Add Product";
}

async function markSold(id){
  const amt = +document.getElementById('sold-'+id).value;
  if(!amt) return toast("Enter sold amount");

  await safeFetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"markSold",
      id:id,
      soldAmount:amt
    })
  });

  toast("Marked Sold");
  loadDashboard();
  loadItems();
}

async function editSold(id){
  const amt = prompt("Enter new sold amount");
  if(!amt) return;

  await safeFetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"editSold",
      id:id,
      soldAmount:+amt
    })
  });

  toast("Sold Updated");
  loadDashboard();
  loadItems();
}

async function deleteItem(id){
  if(!confirm("Delete item?")) return;

  await safeFetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"deleteItem",
      id:id
    })
  });

  toast("Item Deleted");
  loadDashboard();
  loadItems();
}

function openEditModal(id){
  safeFetch(API+'?action=getItems').then(data=>{
    const item = data.find(r=>r[0]==id);
    if(!item) return;

    document.getElementById("edit-id").value=item[0];
    document.getElementById("edit-name").value=item[2];
    document.getElementById("edit-category").value=item[3];
    document.getElementById("edit-purchase").value=item[4];
    document.getElementById("edit-shipping").value=item[5];
    document.getElementById("edit-other").value=item[6];

    editModal.style.display="flex";
  });
}

function closeEditModal(){
  editModal.style.display="none";
}

async function saveEditItem(){
  await safeFetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"editItem",
      id:document.getElementById("edit-id").value,
      productName:document.getElementById("edit-name").value,
      category:document.getElementById("edit-category").value,
      purchaseAmount:+document.getElementById("edit-purchase").value,
      shippingFee:+document.getElementById("edit-shipping").value,
      otherFee:+document.getElementById("edit-other").value
    })
  });

  toast("Item Updated");
  closeEditModal();
  loadDashboard();
  loadItems();
}

function toggleDarkMode(){
  document.body.classList.toggle("dark");
  localStorage.setItem("darkmode",document.body.classList.contains("dark")?"on":"off");
}

function loadDarkMode(){
  if(localStorage.getItem("darkmode")==="on"){
    document.body.classList.add("dark");
    darkSwitch.checked=true;
  }
}

function toggleAddForm(force=false){
  if(force){
    addFormBox.style.display="none";
    return;
  }
  addFormBox.style.display = addFormBox.style.display==="none" ? "block" : "none";
}

loadDarkMode();
loadDashboard();
loadItems();
</script>
</body>
</html>
