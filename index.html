<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DGL | BuySell Inventory Pro</title>
  <link rel="icon" href="https://i.ibb.co/p6pRc65C/received-26163013153378553.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg:#e8edf5; --orb1:#1e3a5f; --orb2:#0369a1; --orb3:#1d4ed8; --orb4:#0f766e;
      --glass:rgba(255,255,255,0.62); --glass-border:rgba(255,255,255,0.82);
      --shadow:0 8px 32px rgba(30,58,95,0.13);
      --text:#0f172a; --subtext:#475569; --accent:#1d4ed8; --green:#22c55e; --red:#ef4444;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Nunito',sans-serif; color:var(--text); min-height:100vh; overflow-x:hidden; background:var(--bg); transition:background .4s,color .4s; }
    .bg-canvas { position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
    .orb { position:absolute; border-radius:50%; filter:blur(80px); opacity:0.35; animation:drift 18s ease-in-out infinite alternate; }
    .orb1 { width:520px; height:520px; background:var(--orb1); top:-120px; left:-100px; animation-duration:20s; }
    .orb2 { width:420px; height:420px; background:var(--orb2); top:40%; right:-80px; animation-duration:15s; animation-delay:-5s; }
    .orb3 { width:480px; height:480px; background:var(--orb3); bottom:-100px; left:30%; animation-duration:22s; animation-delay:-10s; }
    .orb4 { width:300px; height:300px; background:var(--orb4); top:20%; left:50%; animation-duration:17s; animation-delay:-3s; }
    @keyframes drift { 0%{transform:translate(0,0) scale(1)} 33%{transform:translate(40px,-30px) scale(1.05)} 66%{transform:translate(-20px,40px) scale(0.97)} 100%{transform:translate(30px,20px) scale(1.03)} }
    .bg-canvas::after { content:''; position:absolute; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); opacity:0.5; pointer-events:none; }
    .topbar,.container,.toast,.spinner-overlay,.modal,#fabBtn { position:relative; z-index:1; }
    .topbar { display:flex; justify-content:space-between; align-items:center; padding:14px 24px; background:rgba(255,255,255,0.7); backdrop-filter:blur(20px); border-bottom:1px solid rgba(255,255,255,0.9); box-shadow:0 4px 24px rgba(30,58,95,0.10); position:sticky; top:0; z-index:99; }
    .topbar-left { display:flex; align-items:center; gap:12px; }
    .app-icon { width:48px; height:48px; border-radius:16px; background:linear-gradient(135deg,#1e3a5f,#1d4ed8); display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .app-icon img { width:100%; height:100%; object-fit:cover; border-radius:16px; }
    .app-text h2 { font-family:'Syne',sans-serif; font-size:17px; color:var(--text); }
    .app-text p { font-size:11px; color:var(--subtext); margin-top:1px; }
    .topbar-right { display:flex; align-items:center; gap:14px; }
    .container { padding:16px 18px; max-width:1200px; margin:auto; }
    .cards { display:grid; grid-template-columns:repeat(6,1fr); gap:12px; margin:14px 0; }
    .card { border-radius:22px; box-shadow:var(--shadow); padding:18px 10px; text-align:center; transition:transform .3s; }
    .card small { display:block; color:rgba(255,255,255,0.8); margin:5px 0; font-size:10px; font-weight:700; text-transform:uppercase; }
    .card h3 { font-family:'Syne',sans-serif; font-size:18px; color:#fff; text-shadow:0 1px 8px rgba(0,0,0,0.15); }
    .card .card-emoji { font-size:22px; display:block; margin-bottom:2px; }
    .card-capital  { background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 100%); }
    .card-sales    { background:linear-gradient(135deg,#065f46 0%,#10b981 100%); }
    .card-profit   { background:linear-gradient(135deg,#1e3a5f 0%,#7c3aed 100%); }
    .card-onhand   { background:linear-gradient(135deg,#0c4a6e 0%,#0ea5e9 100%); }
    .card-sold     { background:linear-gradient(135deg,#166534 0%,#22c55e 100%); }
    .card-traded   { background:linear-gradient(135deg,#92400e 0%,#f59e0b 100%); }
    .box { background:var(--glass); backdrop-filter:blur(16px); border:1px solid var(--glass-border); border-radius:20px; box-shadow:var(--shadow); padding:16px; margin-top:14px; }
    .modal { display:none; position:fixed; inset:0; background:rgba(15,23,42,0.55); backdrop-filter:blur(6px); justify-content:center; align-items:center; z-index:9999; padding:15px; }
    .modal-content { background:rgba(255,255,255,0.95); backdrop-filter:blur(20px); border-radius:24px; padding:22px; width:100%; max-width:440px; }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .form-grid button { grid-column:span 2; }
    .full-col { grid-column:span 2; }
    input,select,textarea { width:100%; padding:11px 14px; border-radius:12px; border:1.5px solid rgba(29,78,216,0.18); font-size:14px; background:rgba(255,255,255,0.7); color:var(--text); outline:none; }
    button { width:100%; padding:11px 14px; border-radius:12px; border:none; background:linear-gradient(135deg,#1e3a5f,#1d4ed8); color:#fff; font-family:'Nunito',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:.2s; }
    button:hover { opacity:.92; transform:translateY(-1px); }
    .search-row { display:grid; grid-template-columns:1fr auto auto; gap:10px; align-items:center; }
    .view-toggle { display:flex; gap:4px; }
    .view-btn { width:auto; padding:8px 12px; border-radius:10px; background:rgba(255,255,255,0.7); border:1.5px solid rgba(29,78,216,0.18); }
    .view-btn.active { background:linear-gradient(135deg,#1e3a5f,#1d4ed8); color:#fff; }
    .export-row { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
    .export-btn { width:auto; padding:8px 16px; background:rgba(255,255,255,0.7); border:1.5px solid rgba(29,78,216,0.2); }
    .category-tabs { display:flex; gap:8px; flex-wrap:wrap; margin:12px 0; }
    .category-tabs button { width:auto; padding:7px 16px; border-radius:50px; background:rgba(255,255,255,0.6); border:1.5px solid rgba(29,78,216,0.2); }
    .category-tabs button.active { background:linear-gradient(135deg,#1e3a5f,#1d4ed8); color:#fff; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; margin-top:14px; }
    .list-view { display:flex; flex-direction:column; gap:8px; margin-top:14px; }
    .list-item { background:var(--glass); backdrop-filter:blur(16px); border:1px solid var(--glass-border); border-radius:16px; display:grid; grid-template-columns:48px 1fr auto; align-items:center; gap:12px; padding:12px 14px; cursor:pointer; }
    .item { background:var(--glass); backdrop-filter:blur(16px); border:1px solid var(--glass-border); border-radius:22px; overflow:hidden; box-shadow:var(--shadow); position:relative; }
    .status-pill { position:absolute; top:10px; right:10px; padding:5px 12px; border-radius:30px; font-size:11px; font-weight:800; backdrop-filter:blur(8px); color:#fff; z-index:2; }
    .status-pill.onhand { background:rgba(29,78,216,0.85); }
    .status-pill.sold   { background:rgba(21,128,61,0.88); }
    .status-pill.traded { background:rgba(180,83,9,0.88); }
    .item-body { padding:14px; }
    .action-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:10px; }
    .btn-danger { background:linear-gradient(135deg,#ef4444,#f97316) !important; }
    .btn-trade { background:linear-gradient(135deg,#b45309,#d97706) !important; }
    .btn-secondary { background:rgba(255,255,255,0.7) !important; color:var(--text) !important; border:1.5px solid rgba(29,78,216,0.2) !important; }
    .toast { position:fixed; top:20px; right:20px; background:rgba(15,23,42,0.92); backdrop-filter:blur(12px); color:#fff; padding:12px 20px; border-radius:14px; display:none; z-index:10000; }
    .toast.show { display:block; }
    .spinner-overlay { display:none; position:fixed; inset:0; background:rgba(232,237,245,0.5); backdrop-filter:blur(6px); justify-content:center; align-items:center; z-index:9998; }
    .spinner-overlay.show { display:flex; }
    .spinner { width:48px; height:48px; border:4px solid rgba(29,78,216,0.15); border-top-color:#1d4ed8; border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .switch { position:relative; width:48px; height:26px; display:inline-block; }
    .switch input { opacity:0; width:0; height:0; }
    .slider { position:absolute; inset:0; background:rgba(29,78,216,0.2); border-radius:30px; cursor:pointer; transition:.3s; border:1.5px solid rgba(29,78,216,0.3); }
    .slider:before { content:""; position:absolute; width:18px; height:18px; left:3px; top:3px; background:#1d4ed8; border-radius:50%; transition:.3s; }
    input:checked + .slider:before { transform:translateX(22px); background:#fff; }
    .bottom-nav { display:none; position:fixed; bottom:0; left:0; right:0; background:rgba(255,255,255,0.88); backdrop-filter:blur(20px); border-top:1px solid rgba(29,78,216,0.1); padding:8px 0 env(safe-area-inset-bottom,8px); z-index:998; }
    .bottom-nav-inner { display:grid; grid-template-columns:repeat(4,1fr); max-width:480px; margin:auto; }
    .nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 0; background:none; border:none; color:var(--subtext); font-size:10px; font-weight:700; }
    .nav-item.active { color:var(--accent); }
    @media(max-width:600px) { .bottom-nav { display:block; } #fabBtn { display:none; } .cards { grid-template-columns:repeat(3,1fr); } .search-row { grid-template-columns:1fr auto; } body { padding-bottom:80px; } }
    body.dark { --bg:#020917; --glass:rgba(8,20,50,0.55); --glass-border:rgba(99,155,255,0.15); --text:#e8f0ff; --subtext:#7b92bb; }
  </style>
</head>
<body>
<div class="bg-canvas"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div><div class="orb orb4"></div></div>
<div class="toast" id="toast"></div>
<div class="spinner-overlay" id="spinnerOverlay"><div class="spinner"></div></div>
<nav class="bottom-nav"><div class="bottom-nav-inner">
  <button class="nav-item active" id="nav-home" onclick="navTo('home')"><span class="nav-icon">🏠</span>Home</button>
  <button class="nav-item" id="nav-add" onclick="navTo('add')"><span class="nav-icon">➕</span>Add</button>
  <button class="nav-item" id="nav-chart" onclick="navTo('chart')"><span class="nav-icon">📊</span>Chart</button>
  <button class="nav-item" id="nav-export" onclick="navTo('export')"><span class="nav-icon">📤</span>Export</button>
</div></nav>
<div class="topbar"><div class="topbar-left"><div class="app-icon"><img src="https://i.ibb.co/p6pRc65C/received-26163013153378553.jpg" style="width:100%;height:100%;object-fit:cover;border-radius:16px;"></div><div class="app-text"><h2>DGL | BuySell Inventory Pro</h2><p>BUY | SELL | GROW</p></div></div><div class="topbar-right"><label class="switch"><input type="checkbox" onchange="toggleDarkMode()" id="darkSwitch"><span class="slider"></span></label></div></div>
<div class="container">
  <div class="cards">
    <div class="card card-capital"><span class="card-emoji">💸</span><small>Capital</small><h3 id="capital">₱0</h3></div>
    <div class="card card-sales"><span class="card-emoji">💰</span><small>Sales</small><h3 id="sales">₱0</h3></div>
    <div class="card card-profit"><span class="card-emoji">📈</span><small>Profit</small><h3 id="profit">₱0</h3></div>
    <div class="card card-onhand"><span class="card-emoji">📦</span><small>On Hand</small><h3 id="onhand">0</h3></div>
    <div class="card card-sold"><span class="card-emoji">✅</span><small>Sold</small><h3 id="sold">0</h3></div>
    <div class="card card-traded"><span class="card-emoji">🔄</span><small>Traded</small><h3 id="traded">0</h3></div>
  </div>
  <div id="addFormBox" class="box">
    <div class="form-grid">
      <input id="nameInput" placeholder="Product Name" oninput="saveDraft()">
      <select id="categoryInput" onchange="saveDraft()"><option>Gadget / Console</option><option>Phone</option><option>Appliance</option><option>Others</option></select>
      <input id="priceInput" type="number" placeholder="Purchase Amount" oninput="saveDraft()">
      <input id="shippingInput" type="number" placeholder="Shipping Fee" oninput="saveDraft()">
      <input id="otherInput" type="number" placeholder="Other Fee" oninput="saveDraft()">
      <input id="imageInput" type="file" accept="image/*" multiple>
      <textarea id="notesInput" class="full-col" placeholder="Notes (optional)" oninput="saveDraft()"></textarea>
      <button onclick="addItem()">Add Product</button>
    </div>
  </div>
  <div class="box">
    <div class="search-row">
      <input id="search" placeholder="🔍 Search product..." oninput="debouncedSearch()">
      <select id="filter" onchange="resetAndRender()"><option value="ALL">All Status</option><option value="ON HAND">On Hand</option><option value="SOLD">Sold</option><option value="TRADED">Traded</option></select>
      <div class="view-toggle"><button class="view-btn active" id="btnGrid" onclick="setView('grid')">⊞</button><button class="view-btn" id="btnList" onclick="setView('list')">☰</button></div>
    </div>
    <div class="filter-chips"><button class="chip active" onclick="setChip('all',this)">🔍 All</button><button class="chip" onclick="setChip('profitable',this)">💹 Profitable</button><button class="chip" onclick="setChip('thisMonth',this)">📅 This Month</button><button class="chip" onclick="setChip('traded',this)">🔄 Traded</button></div>
    <div class="sort-row"><label>Sort:</label><select id="sortSelect" onchange="resetAndRender()"><option value="newest">🕐 Newest</option><option value="oldest">🕰 Oldest</option><option value="profit_high">📈 Highest Profit</option><option value="profit_low">📉 Lowest Profit</option><option value="capital_low">💸 Lowest Capital</option><option value="capital_high">💰 Highest Capital</option><option value="name_az">🔤 Name A–Z</option></select></div>
    <div class="export-row"><button class="export-btn" onclick="exportCSV()">📄 Export CSV</button><button class="export-btn" onclick="exportPDF()">🖨️ Export PDF</button></div>
  </div>
  <div class="category-tabs"><button class="active" onclick="setCategoryFilter('ALL',this)">All</button><button onclick="setCategoryFilter('Gadget / Console',this)">Gadget / Console</button><button onclick="setCategoryFilter('Phone',this)">Phone</button><button onclick="setCategoryFilter('Appliance',this)">Appliance</button><button onclick="setCategoryFilter('Others',this)">Others</button></div>
  <div id="productContainer"></div>
  <div class="chart-box"><h3>📊 Sales & Profit History</h3><div class="chart-tabs"><button class="chart-tab active" onclick="switchChart('bar',this)">Bar</button><button class="chart-tab" onclick="switchChart('line',this)">Line</button></div><canvas id="salesChart" height="100"></canvas></div>
</div>
<button onclick="toggleAddForm()" id="fabBtn">+</button>

<script>
// ---------- Configuration ----------
const API = 'https://script.google.com/macros/s/AKfycbzhvOEUeMnjsuTjdi6D2vFko9fEF_kkFcmhYoXA81dJkPjkr25ABfeyYSRbNwAu6lde/exec';
const IMGBB_KEY = 'c1047f546534cb119c255afbd588a63f';
const LOGO_URL = 'https://i.ibb.co/p6pRc65C/received-26163013153378553.jpg';

// ---------- Global State ----------
let cachedItems = [];
let cacheTimestamp = 0;
const CACHE_TTL = 30000;
let salesChart = null;
let currentChartType = 'bar';
let currentPage = 1;
const ITEMS_PER_PAGE = 12;
let currentView = localStorage.getItem('inventoryView') || 'grid';
let activeChip = 'all';
let activeCategory = 'ALL';
let pendingDelete = null;
let undoTimer = null;
let activityLog = JSON.parse(localStorage.getItem('activityLog') || '[]');

// ---------- Helper Functions ----------
function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
function toast(msg, type = '') { const t = document.getElementById('toast'); t.className = 'toast'+(type?' '+type:''); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2600); }
function showSpinner() { document.getElementById('spinnerOverlay').classList.add('show'); }
function hideSpinner() { document.getElementById('spinnerOverlay').classList.remove('show'); }
function safeFetch(url, o={}) { return fetch(url, o).then(r=>r.text()).then(t=>{ try{ return JSON.parse(t); } catch(e){ return null; } }); }

function logActivity(type, name, id, extra = '') {
  activityLog.unshift({ type, name, id, extra, time: Date.now() });
  if (activityLog.length > 50) activityLog = activityLog.slice(0, 50);
  localStorage.setItem('activityLog', JSON.stringify(activityLog));
}

function openLightbox(src) { const lb = document.getElementById('lightbox'); if(!lb) return; document.getElementById('lightboxImg').src = src; lb.classList.add('show'); }
function closeLightbox() { document.getElementById('lightbox')?.classList.remove('show'); }

// ---------- UI / Rendering ----------
function setView(v) {
  if (currentView === v) return;
  currentView = v;
  localStorage.setItem('inventoryView', v);
  document.getElementById('btnGrid').classList.toggle('active', v === 'grid');
  document.getElementById('btnList').classList.toggle('active', v === 'list');
  renderItems();
}

function setChip(chip, btn) {
  activeChip = chip;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  currentPage = 1;
  renderItems();
}

function setCategoryFilter(cat, btn) {
  activeCategory = cat;
  document.querySelectorAll('.category-tabs button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  currentPage = 1;
  renderItems();
}

function applySort(items) {
  const sort = document.getElementById('sortSelect')?.value || 'newest';
  const arr = [...items];
  if (sort === 'newest') return arr.reverse();
  if (sort === 'oldest') return arr;
  if (sort === 'profit_high') return arr.sort((a,b) => (+b[13]||0) - (+a[13]||0));
  if (sort === 'profit_low') return arr.sort((a,b) => (+a[13]||0) - (+b[13]||0));
  if (sort === 'capital_high') return arr.sort((a,b) => (+b[7]||0) - (+a[7]||0));
  if (sort === 'capital_low') return arr.sort((a,b) => (+a[7]||0) - (+b[7]||0));
  if (sort === 'name_az') return arr.sort((a,b) => (a[2]||'').localeCompare(b[2]||''));
  return arr;
}

function applyChip(items) {
  if (activeChip === 'all') return items;
  const now = new Date();
  const month = now.getMonth();
  const year = now.getFullYear();
  if (activeChip === 'profitable') return items.filter(r => (+r[13]||0) > 0);
  if (activeChip === 'traded') return items.filter(r => (r[10]||'') === 'TRADED');
  if (activeChip === 'thisMonth') return items.filter(r => { const d = new Date(r[1]); return !isNaN(d) && d.getMonth()===month && d.getFullYear()===year; });
  return items;
}

function renderItems() {
  const search = document.getElementById('search').value.toLowerCase();
  const filterStatus = document.getElementById('filter').value;
  let filtered = cachedItems.filter(r => {
    const name = (r[2]||'').toLowerCase();
    const cat = r[3]||'';
    const st = r[10]||'ON HAND';
    if (name.indexOf(search) === -1) return false;
    if (filterStatus !== 'ALL' && st !== filterStatus) return false;
    if (activeCategory !== 'ALL' && cat !== activeCategory) return false;
    return true;
  });
  filtered = applySort(applyChip(filtered));
  const totalFiltered = filtered.length;
  const totalPages = Math.ceil(totalFiltered / ITEMS_PER_PAGE);
  if (currentPage > totalPages && totalPages > 0) currentPage = totalPages;
  const start = (currentPage-1)*ITEMS_PER_PAGE;
  const pageItems = filtered.slice(start, start+ITEMS_PER_PAGE);
  const container = document.getElementById('productContainer');
  if (totalFiltered === 0) {
    container.innerHTML = `<div class="grid"><div style="font-size:52px;text-align:center">📭</div><p style="text-align:center">No products found</p></div>`;
    return;
  }
  if (currentView === 'list') {
    let html = `<div class="list-view">`;
    for (const r of pageItems) {
      const id = r[0]||'', p = r[2]||'', c = r[3]||'', cap = +r[7]||0, pro = +r[13]||0;
      const imgs = (r[9]||'').split(',').filter(Boolean);
      const st = r[10]||'ON HAND';
      const pillClass = st==='SOLD'?'sold':st==='TRADED'?'traded':'onhand';
      const thumbSrc = imgs[0] || '';
      html += `<div class="list-item" data-id="${id}"><div class="list-thumb">${thumbSrc?`<img src="${thumbSrc}" style="width:48px;height:48px;object-fit:cover;">`:'<span>📦</span>'}</div><div class="list-info"><h4>${escapeHtml(p)}</h4><p>${escapeHtml(c)} · ₱${cap.toLocaleString()}</p></div><div class="list-meta"><span class="list-pill ${pillClass}">${st==='ON HAND'?'On Hand':st}</span><span class="list-profit" style="color:${pro>=0?'var(--green)':'var(--red)'}">₱${pro.toLocaleString()}</span></div></div>`;
    }
    html += `</div>`;
    container.innerHTML = html;
    document.querySelectorAll('.list-item').forEach(el => el.addEventListener('click', (e) => { if(!e.target.closest('button')) openDetailModal(el.getAttribute('data-id')); }));
  } else {
    let html = `<div class="grid">`;
    for (const r of pageItems) {
      const id = r[0]||'', p = r[2]||'', c = r[3]||'', pu=+r[4]||0, sh=+r[5]||0, o=+r[6]||0, cap=+r[7]||0, soldp=+r[12]||0, pro=+r[13]||0, notes=r[14]||'';
      const imgs = (r[9]||'').split(',').filter(Boolean);
      const st = r[10]||'ON HAND';
      const pillClass = st==='SOLD'?'sold':st==='TRADED'?'traded':'onhand';
      const pillLabel = st==='ON HAND'?'📦 On Hand':st==='SOLD'?'✅ Sold':'🔄 Traded';
      let imgHTML = '';
      if (imgs.length) {
        imgHTML = `<div class="item-gallery"><img class="main-img" src="${imgs[0]}" style="width:100%;height:200px;object-fit:cover;cursor:pointer;" onclick="openLightbox('${imgs[0]}')">${imgs.length>1?`<div class="thumb-row">${imgs.map((url,i)=>`<img src="${url}" style="width:48px;height:40px;object-fit:cover;" onclick="event.stopPropagation();openLightbox('${url}')">`).join('')}</div>`:''}</div>`;
      } else {
        imgHTML = `<div class="item-no-img" style="height:110px;display:flex;align-items:center;justify-content:center;font-size:38px;">📦</div>`;
      }
      html += `<div class="item" id="item-${id}"><span class="status-pill ${pillClass}">${pillLabel}</span>${imgHTML}<div class="item-body"><h3>${escapeHtml(p)}</h3><p>${escapeHtml(c)}</p><p>Capital: <strong>₱${cap.toLocaleString()}</strong></p>${st!=='ON HAND'?`<p>Profit: <strong style="color:${pro>=0?'green':'red'}">₱${pro.toLocaleString()}</strong></p>`:''}${notes?`<div class="item-notes">💬 ${escapeHtml(notes)}</div>`:''}${st==='ON HAND'?`<input id="sold-${id}" type="number" placeholder="Sold Amount" style="margin-top:8px;width:100%"><button style="margin-top:6px" onclick="markSold('${id}')">Mark Sold</button><div class="action-row-3" style="margin-top:8px"><button class="btn-trade" onclick="openTradeModal('${id}','${escapeHtml(p).replace(/'/g,"\\'")}','${cap}')">🔄 Trade</button><button onclick="openEditModal('${id}','${escapeHtml(p).replace(/'/g,"\\'")}','${c}','${pu}','${sh}','${o}','${escapeHtml(notes).replace(/'/g,"\\'")}')">✏️ Edit</button><button class="btn-danger" onclick="confirmDelete('${id}','${escapeHtml(p).replace(/'/g,"\\'")}')">🗑️</button></div>`:st==='TRADED'?`<div class="action-row"><button onclick="openEditModal('${id}','${escapeHtml(p).replace(/'/g,"\\'")}','${c}','${pu}','${sh}','${o}','${escapeHtml(notes).replace(/'/g,"\\'")}')">✏️ Edit</button><button class="btn-danger" onclick="confirmDelete('${id}','${escapeHtml(p).replace(/'/g,"\\'")}')">🗑️ Delete</button></div>`:`<button class="full-btn" onclick="promptEditSold('${id}')">Edit Sold</button><div class="action-row"><button onclick="openEditModal('${id}','${escapeHtml(p).replace(/'/g,"\\'")}','${c}','${pu}','${sh}','${o}','${escapeHtml(notes).replace(/'/g,"\\'")}')">✏️ Edit</button><button class="btn-danger" onclick="confirmDelete('${id}','${escapeHtml(p).replace(/'/g,"\\'")}')">🗑️ Delete</button></div>`}</div></div>`;
    }
    html += `</div>`;
    container.innerHTML = html;
    document.querySelectorAll('.item').forEach(el => el.addEventListener('click', (e) => { if(!e.target.closest('button') && !e.target.closest('.thumb-row img')) openDetailModal(el.id.replace('item-','')); }));
  }
  // pagination controls
  const existing = document.getElementById('paginationControls');
  if (existing) existing.remove();
  if (totalFiltered > ITEMS_PER_PAGE) {
    const pc = document.createElement('div'); pc.id = 'paginationControls';
    let pagHtml = `<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:10px;">`;
    pagHtml += `<button class="page-btn" onclick="changePage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹ Prev</button>`;
    let startPage = Math.max(1, currentPage-2);
    let endPage = Math.min(totalPages, startPage+4);
    for (let i=startPage; i<=endPage; i++) pagHtml += `<button class="page-btn ${i===currentPage?'active':''}" onclick="changePage(${i})">${i}</button>`;
    pagHtml += `<button class="page-btn" onclick="changePage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>Next ›</button>`;
    pagHtml += `<span style="font-size:13px">${start+1}–${Math.min(start+ITEMS_PER_PAGE,totalFiltered)} of ${totalFiltered}</span></div>`;
    pc.innerHTML = pagHtml;
    container.insertAdjacentElement('afterend', pc);
  }
}

async function uploadImage(file) {
  return new Promise((res) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const base64 = e.target.result.split(',')[1];
        const fd = new FormData();
        fd.append('image', base64);
        const r = await fetch('https://api.imgbb.com/1/upload?key='+IMGBB_KEY, {method:'POST', body:fd});
        const d = await r.json();
        res(d.success ? d.data.url : '');
      } catch(e) { res(''); }
    };
    reader.onerror = () => res('');
    reader.readAsDataURL(file);
  });
}
async function uploadImages(files) { if(!files.length) return ''; const urls = await Promise.all(Array.from(files).slice(0,5).map(uploadImage)); return urls.filter(Boolean).join(','); }

  showSpinner();

}

function updateTradePreview() {
  const capital = +document.getElementById('trade-original-capital').value || 0;

  document.getElementById('prev-profit').innerHTML = `Profit on your item: ₱${profit.toLocaleString()}`;
  document.getElementById('prev-profit').style.color = profit>=0 ? 'var(--green)' : 'var(--red)';

async function submitTrade() {

  const tradeCat = document.getElementById('trade-category').value;
  const tradeVal = +document.getElementById('trade-value').value || 0;

  const newCapital = tradeVal + shipping + other;

  const result = await safeFetch(API, {method:'POST', body:JSON.stringify({action:'tradeItem', originalId, tradeValue:tradeVal, cashDirection:cashDir, cashAmount:cashAmt, profit, newName:tradeName, newCategory:tradeCat, newCapital, newShipping:shipping, newOther:other, notes, photoURL:''})});

function buildChart(data) {
  const sold = data.filter(r => r[10]==='SOLD' && r[11]);
  const grouped = {};
  sold.forEach(r => {
    const d = new Date(r[11]);
    if(isNaN(d)) return;
    const key = d.toLocaleString('default', {month:'short', year:'2-digit'});
    if(!grouped[key]) grouped[key] = {sales:0, profit:0};
    grouped[key].sales += +r[12]||0;
    grouped[key].profit += +r[13]||0;
  });
  const labels = Object.keys(grouped);
  const salesData = labels.map(k => grouped[k].sales);
  const profitData = labels.map(k => grouped[k].profit);
  const isDark = document.body.classList.contains('dark');
  const gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(29,78,216,0.08)';
  const labelColor = isDark ? '#94a3b8' : '#475569';
  const ctx = document.getElementById('salesChart').getContext('2d');
  if (salesChart) salesChart.destroy();
  salesChart = new Chart(ctx, {
    type: currentChartType,
    data: { labels: labels.length?labels:['No sales yet'], datasets: [
      { label:'Sales (₱)', data:salesData.length?salesData:[0], borderColor:'#22c55e', backgroundColor:'rgba(34,197,94,0.12)', tension:0.4, fill:true },
      { label:'Profit (₱)', data:profitData.length?profitData:[0], borderColor:'#1d4ed8', backgroundColor:'rgba(29,78,216,0.12)', tension:0.4, fill:true }
    ] },
    options: { responsive:true, plugins:{ legend:{ labels:{ color:labelColor } } }, scales:{ x:{ ticks:{ color:labelColor }, grid:{ color:gridColor } }, y:{ ticks:{ color:labelColor }, grid:{ color:gridColor } } } }
  });
}
function switchChart(type, btn) {
  currentChartType = type;
  document.querySelectorAll('.chart-tab').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  buildChart(cachedItems);
}

function exportCSV() {
  if(!cachedItems.length) return toast('No data', 'error');
  const headers = ['ID','Date','Product','Category','Purchase','Shipping','Other','Capital','Qty','Images','Status','Sold Date','Sold Amount','Profit','Notes','Buyer','Seller'];
  const rows = cachedItems.map(r => r.map(v => `"${v}"`).join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = `inventory_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  toast('CSV Exported', 'success');
}
function exportPDF() {
  if(!cachedItems.length) return toast('No data', 'error');
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'landscape' });
  doc.setFontSize(16); doc.text('BuySell Inventory Report', 14, 16);
  doc.setFontSize(10); doc.text(`Generated: ${new Date().toLocaleString()}`, 14, 23);
  const headers = ['ID','Product','Category','Capital','Status','Sold','Profit','Notes'];
  const colX = [14, 39, 69, 99, 127, 155, 183, 211];
  let y = 32;
  doc.setFillColor(30,58,95); doc.rect(14, y, 200, 8, 'F');
  doc.setTextColor(255,255,255); doc.setFontSize(9);
  headers.forEach((h,i) => doc.text(h, colX[i]+2, y+5.5));
  doc.setTextColor(0,0,0);
  cachedItems.forEach((r, idx) => {
    y += 8;
    if(y > 190) { doc.addPage(); y = 20; doc.setFillColor(30,58,95); doc.rect(14, y, 200, 8, 'F'); doc.setTextColor(255,255,255); headers.forEach((h,i) => doc.text(h, colX[i]+2, y+5.5)); doc.setTextColor(0,0,0); y+=8; }
    if(idx%2===0) { doc.setFillColor(235,240,250); doc.rect(14, y, 200, 8, 'F'); }
    const row = [r[0]||'', (r[2]||'').slice(0,20), (r[3]||'').slice(0,12), '₱'+(+r[7]||0).toLocaleString(), r[10]||'ON HAND', r[12]?'₱'+(+r[12]).toLocaleString():'-', '₱'+(+r[13]||0).toLocaleString(), (r[14]||'').slice(0,20)];
    row.forEach((cell,i) => doc.text(String(cell), colX[i]+2, y+5.5));
  });
  doc.save(`inventory_${new Date().toISOString().slice(0,10)}.pdf`);
  toast('PDF Exported', 'success');
}

// ---------- Loading & Search ----------
function showSkeletons() {
  document.getElementById('productContainer').innerHTML = `<div class="grid">${Array(6).fill('<div class="skeleton"><div class="skel-img"></div><div class="skel-body"><div class="skel-line"></div><div class="skel-line"></div></div></div>').join('')}</div>`;
}
let searchTimer;
function debouncedSearch() { clearTimeout(searchTimer); searchTimer = setTimeout(() => { currentPage=1; renderItems(); }, 280); }
function resetAndRender() { currentPage=1; renderItems(); }
function loadItems(forceRefresh=false) {
  const now = Date.now();
  if(!forceRefresh && cachedItems.length && (now-cacheTimestamp)<CACHE_TTL) { renderItems(); return; }
  showSkeletons();
  safeFetch(API+'?action=getItems').then(data => {
    if(!Array.isArray(data)) { document.getElementById('productContainer').innerHTML = '<p>Error loading</p>'; return; }
    cachedItems = data;
    cacheTimestamp = now;
    currentPage = 1;
    renderItems();
    buildChart(data);
  });
}

// ---------- Mobile Add Form ----------
function toggleAddForm(forceClose=false) {
  if(window.innerWidth > 600) {
    const box = document.getElementById('addFormBox');
    if(forceClose) box.style.display = 'none';
    else box.style.display = box.style.display === 'none' ? 'block' : 'none';
    return;
  }
  let sheet = document.getElementById('mobileAddSheet');
  if(!sheet) {
    const original = document.getElementById('addFormBox');
    const clone = original.cloneNode(true);
    clone.id = 'mobileAddSheet';
    clone.classList.add('modal');
    clone.style.display = 'none';
    const content = document.createElement('div');
    content.className = 'modal-content';
    while(clone.firstChild) content.appendChild(clone.firstChild);
    clone.appendChild(content);
    const cancel = document.createElement('button');
    cancel.innerText = 'Cancel';
    cancel.className = 'btn-secondary';
    cancel.style.marginTop = '8px';
    cancel.onclick = () => { document.getElementById('mobileAddSheet').style.display = 'none'; };
    content.appendChild(cancel);
    document.body.appendChild(clone);
    sheet = clone;
  }
  if(forceClose) sheet.style.display = 'none';
  else sheet.style.display = 'flex';
}
function navTo(tab) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(`nav-${tab}`)?.classList.add('active');
  if(tab === 'home') { toggleAddForm(true); window.scrollTo(0,0); }
  else if(tab === 'add') { toggleAddForm(); document.querySelector('.chart-box').scrollIntoView({behavior:'smooth', block:'center'}); }
  else if(tab === 'chart') { document.querySelector('.chart-box').scrollIntoView({behavior:'smooth', block:'start'}); }
  else if(tab === 'export') { document.querySelector('.export-row').scrollIntoView({behavior:'smooth', block:'center'}); }
}
