<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuySell Inventory Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f3f4f7;
  transition:.3s;
}

.container{
  padding:15px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 20px;
  background:#fff;
  box-shadow:0 4px 15px rgba(0,0,0,.08);
  position:sticky;
  top:0;
  z-index:100;
}

.topbar-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.app-icon{
  width:50px;
  height:50px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  background:#f1f1f1;
  border-radius:14px;
}

.app-text h2{
  margin:0;
  font-size:20px;
}

.app-text p{
  margin:0;
  font-size:12px;
  color:gray;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
  gap:12px;
  margin-top:15px;
}

.card{
  background:#fff;
  border-radius:14px;
  padding:15px;
  text-align:center;
  box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.card small{
  display:block;
  margin:6px 0;
  color:gray;
}

.box,.item,.modal-content{
  background:#fff;
  padding:15px;
  border-radius:14px;
  margin-top:15px;
  box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.form-grid button{
  grid-column:span 2;
}

input,select,button{
  width:100%;
  padding:10px;
  box-sizing:border-box;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  background:#111;
  color:#fff;
  border:none;
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:15px;
  margin-top:15px;
}

.item img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:10px;
}

.category-tabs{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:15px;
}

#fabBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  font-size:30px;
  z-index:999;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.cancel-btn{
  background:gray;
  margin-top:8px;
}

/* SWITCH */
.switch{
  position:relative;
  width:50px;
  height:24px;
  display:inline-block;
}
.switch input{opacity:0;width:0;height:0;}
.slider{
  position:absolute;
  inset:0;
  cursor:pointer;
  background:#ccc;
  border-radius:30px;
  transition:.3s;
}
.slider:before{
  content:"";
  position:absolute;
  width:18px;
  height:18px;
  left:3px;
  top:3px;
  background:#fff;
  border-radius:50%;
  transition:.3s;
}
input:checked + .slider{
  background:#111;
}
input:checked + .slider:before{
  transform:translateX(26px);
}

/* DARK MODE */
body.dark{
  background:#111;
  color:white;
}
body.dark .topbar,
body.dark .card,
body.dark .box,
body.dark .item,
body.dark .modal-content{
  background:#1e1e1e;
  color:white;
  box-shadow:none;
}
body.dark input,
body.dark select{
  background:#2b2b2b;
  color:white;
  border:1px solid #555;
}

/* MOBILE */
@media(max-width:768px){
  .form-grid{
    grid-template-columns:1fr;
  }
  .form-grid button{
    grid-column:span 1;
  }
}
  </style>
</head>
<body>

<!-- PREMIUM TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="app-icon">📦</div>
    <div class="app-text">
      <h2>BuySell Inventory Pro</h2>
      <p>Smart inventory monitoring dashboard</p>
    </div>
  </div>

  <div class="topbar-right">
    <label class="switch">
      <input type="checkbox" onchange="toggleDarkMode()" id="darkSwitch">
      <span class="slider"></span>
    </label>
  </div>
</div>

<div class="container">

  <!-- DASHBOARD CARDS -->
  <div class="cards">
    <div class="card">💸<small>Total Capital</small><h3 id="capital">₱0</h3></div>
    <div class="card">💰<small>Total Sales</small><h3 id="sales">₱0</h3></div>
    <div class="card">📈<small>Total Profit</small><h3 id="profit">₱0</h3></div>
    <div class="card">📦<small>On Hand</small><h3 id="onhand">0</h3></div>
    <div class="card">✅<small>Sold</small><h3 id="sold">0</h3></div>
  </div>

  <!-- FLOATING ADD FORM -->
  <div id="addFormBox" class="box" style="display:none;">
    <h3>Add Product</h3>

    <div class="form-grid">
      <input type="text" id="name" placeholder="Product Name">

      <select id="category">
        <option value="Gadget / Console">Gadget / Console</option>
        <option value="Phone">Phone</option>
        <option value="Appliance">Appliance</option>
        <option value="Others">Others</option>
      </select>

      <input type="number" id="price" placeholder="Purchase Amount">
      <input type="number" id="shipping" placeholder="Shipping Fee">
      <input type="number" id="other" placeholder="Other Fee">
      <input type="file" id="image" accept="image/*">

      <button onclick="addItem()">Add Product</button>
    </div>
  </div>

  <!-- SEARCH FILTER -->
  <div class="box">
    <input id="search" placeholder="Search product..." onkeyup="loadItems()">

    <select id="filter" onchange="loadItems()">
      <option value="ALL">All Status</option>
      <option value="ON HAND">On Hand</option>
      <option value="SOLD">Sold</option>
    </select>
  </div>

  <!-- CATEGORY FILTER -->
  <div id="categoryTabs" class="category-tabs">
    <button onclick="setCategoryFilter('ALL')">All</button>
    <button onclick="setCategoryFilter('Gadget / Console')">Gadget / Console</button>
    <button onclick="setCategoryFilter('Phone')">Phone</button>
    <button onclick="setCategoryFilter('Appliance')">Appliance</button>
    <button onclick="setCategoryFilter('Others')">Others</button>
  </div>

  <!-- PRODUCT GRID -->
  <div id="grid" class="grid"></div>

</div>

<!-- FLOATING ADD BUTTON -->
<button onclick="toggleAddForm()" id="fabBtn">+</button>

<!-- EDIT MODAL -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <h3>Edit Product</h3>

    <input type="hidden" id="edit-id">
    <input type="text" id="edit-name" placeholder="Product Name">

    <select id="edit-category">
      <option value="Gadget / Console">Gadget / Console</option>
      <option value="Phone">Phone</option>
      <option value="Appliance">Appliance</option>
      <option value="Others">Others</option>
    </select>

    <input type="number" id="edit-purchase" placeholder="Purchase Amount">
    <input type="number" id="edit-shipping" placeholder="Shipping Fee">
    <input type="number" id="edit-other" placeholder="Other Fee">

    <button onclick="saveEditItem()">Save Changes</button>
    <button onclick="closeEditModal()" class="cancel-btn">Cancel</button>
  </div>
</div>
<script>
const API = "https://script.google.com/macros/s/AKfycbzhvOEUeMnjsuTjdi6D2vFko9fEF_kkFcmhYoXA81dJkPjkr25ABfeyYSRbNwAu6lde/exec";

let activeCategory = "ALL";

/* SAFE FETCH */
function safeFetch(url, options = {}){
  return fetch(url, options)
    .then(res => res.text())
    .then(text => {
      try{
        return JSON.parse(text);
      }catch(err){
        console.log("RAW:", text);
        return null;
      }
    });
}

/* IMAGE TO BASE64 */
function uploadImage(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();

    reader.onload = e => resolve(e.target.result);
    reader.onerror = err => reject(err);

    reader.readAsDataURL(file);
  });
}

/* CATEGORY */
function setCategoryFilter(cat){
  activeCategory = cat;
  loadItems();
}

/* DASHBOARD */
function loadDashboard(){
  safeFetch(API + "?action=getDashboard").then(data=>{
    if(!data) return;

    document.getElementById("capital").innerText = "₱" + (data.totalCapital || 0);
    document.getElementById("sales").innerText = "₱" + (data.totalSales || 0);
    document.getElementById("profit").innerText = "₱" + (data.totalProfit || 0);
    document.getElementById("onhand").innerText = data.onHand || 0;
    document.getElementById("sold").innerText = data.soldCount || 0;
  });
}

/* LOAD PRODUCTS */
function loadItems(){
  safeFetch(API + "?action=getItems").then(data=>{
    if(!Array.isArray(data)) return;

    const searchVal = document.getElementById("search").value.toLowerCase();
    const filterVal = document.getElementById("filter").value;

    let html = "";

    data.forEach(row=>{

      const id = row[0] || "";
      const product = row[2] || "";
      const category = row[3] || "";
      const purchase = Number(row[4]) || 0;
      const shipping = Number(row[5]) || 0;
      const other = Number(row[6]) || 0;
      const capital = Number(row[7]) || 0;
      const image = row[9] || "";
      const status = row[10] || "ON HAND";
      const soldPrice = Number(row[12]) || 0;
      const profit = Number(row[13]) || 0;

      if(product.toLowerCase().indexOf(searchVal) === -1) return;
      if(filterVal !== "ALL" && status !== filterVal) return;
      if(activeCategory !== "ALL" && category !== activeCategory) return;

      html += `
      <div class="item">
        ${image ? `<img src="${image}">` : ""}
        <h3>${product}</h3>
        <p><b>Category:</b> ${category}</p>
        <p>Purchase: ₱${purchase}</p>
        <p>Shipping: ₱${shipping}</p>
        <p>Other Fees: ₱${other}</p>
        <p>Total Capital: ₱${capital}</p>
        <p>Sold Price: ${soldPrice ? "₱"+soldPrice : "-"}</p>
        <p style="color:${profit >= 0 ? 'green':'red'};">Profit: ₱${profit}</p>
        <p>Status: ${status}</p>

        ${
          status === "ON HAND"
          ? `
            <input type="number" id="sold-${id}" placeholder="Sold Amount">
            <button onclick="markSold('${id}')">Mark Sold</button>
          `
          : `
            <button onclick="editSold('${id}')">Edit Sold</button>
          `
        }

        <button onclick="openEditModal('${id}','${product}','${category}','${purchase}','${shipping}','${other}')">Edit</button>
        <button onclick="deleteItem('${id}')">Delete</button>
      </div>
      `;
    });

    document.getElementById("grid").innerHTML = html;
  });
}

/* ADD PRODUCT */
async function addItem(){
  const file = document.getElementById("image").files[0];
  let photo = "";

  if(file) photo = await uploadImage(file);

  await safeFetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"addItem",
      productName:document.getElementById("name").value,
      category:document.getElementById("category").value,
      purchaseAmount:Number(document.getElementById("price").value),
      shippingFee:Number(document.getElementById("shipping").value),
      otherFee:Number(document.getElementById("other").value),
      quantity:1,
      photoURL:photo
    })
  });

  document.getElementById("name").value = "";
  document.getElementById("price").value = "";
  document.getElementById("shipping").value = "";
  document.getElementById("other").value = "";
  document.getElementById("image").value = "";

  loadDashboard();
  loadItems();
  toggleAddForm(true);
}

/* MARK SOLD */
async function markSold(id){
  const soldAmount = Number(document.getElementById("sold-"+id).value);

  if(!soldAmount){
    alert("Enter sold amount");
    return;
  }

  await safeFetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"markSold",
      id:id,
      soldAmount:soldAmount
    })
  });

  loadDashboard();
  loadItems();
}

/* EDIT SOLD */
async function editSold(id){
  const newSold = prompt("Enter new sold amount:");
  if(!newSold) return;

  await safeFetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"editSold",
      id:id,
      soldAmount:Number(newSold)
    })
  });

  loadDashboard();
  loadItems();
}

/* DELETE */
async function deleteItem(id){
  if(!confirm("Delete this item?")) return;

  await safeFetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"deleteItem",
      id:id
    })
  });

  loadDashboard();
  loadItems();
}

/* EDIT MODAL */
function openEditModal(id,name,category,purchase,shipping,other){
  document.getElementById("edit-id").value = id;
  document.getElementById("edit-name").value = name;
  document.getElementById("edit-category").value = category;
  document.getElementById("edit-purchase").value = purchase;
  document.getElementById("edit-shipping").value = shipping;
  document.getElementById("edit-other").value = other;

  document.getElementById("editModal").style.display = "flex";
}

function closeEditModal(){
  document.getElementById("editModal").style.display = "none";
}

async function saveEditItem(){
  await safeFetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"editItem",
      id:document.getElementById("edit-id").value,
      productName:document.getElementById("edit-name").value,
      category:document.getElementById("edit-category").value,
      purchaseAmount:Number(document.getElementById("edit-purchase").value),
      shippingFee:Number(document.getElementById("edit-shipping").value),
      otherFee:Number(document.getElementById("edit-other").value)
    })
  });

  closeEditModal();
  loadDashboard();
  loadItems();
}

/* DARK MODE */
function toggleDarkMode(){
  document.body.classList.toggle("dark");

  const isDark = document.body.classList.contains("dark");
  document.getElementById("darkSwitch").checked = isDark;
  localStorage.setItem("darkmode", isDark ? "on" : "off");
}

function loadDarkMode(){
  const saved = localStorage.getItem("darkmode");
  if(saved === "on"){
    document.body.classList.add("dark");
    document.getElementById("darkSwitch").checked = true;
  }
}

/* FLOATING FORM */
function toggleAddForm(forceClose = false){
  const box = document.getElementById("addFormBox");

  if(forceClose){
    box.style.display = "none";
    return;
  }

  box.style.display = box.style.display === "none" ? "block" : "none";
}

/* INITIALIZE */
loadDarkMode();
loadDashboard();
loadItems();
</script>
  <button onclick="toggleAddForm()" id="fabBtn" style="
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
font-size:28px;
background:#111;
color:#fff;
border:none;
box-shadow:0 4px 12px rgba(0,0,0,.3);
z-index:999;
">
+
</button>
</body>
</html>
