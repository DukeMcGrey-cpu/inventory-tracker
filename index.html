<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuySell Inventory Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    
body{
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
}

.header{
  position:sticky;
  top:0;
  background:#fff;
  padding:15px;
  font-size:20px;
  font-weight:bold;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
  z-index:10;
}

.container{
  padding:15px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
}

.box{
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-top:15px;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
}

input,button,select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:14px;
}

button{
  background:#007bff;
  color:white;
  border:none;
}

.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:15px;
  margin-top:15px;
}

.item{
  background:#fff;
  padding:12px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
}

.item img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:10px;
}

.small-btn{
  padding:8px;
  margin-top:5px;
}

.profit-pos{color:green;}
.profit-neg{color:red;}

  </style>
</head>
<body>

<div class="header">📦 Inventory App</div>

<div class="container">

<div class="cards">
  <div class="card">Capital<br><b id="capital">0</b></div>
  <div class="card">Sales<br><b id="sales">0</b></div>
  <div class="card">Profit<br><b id="profit">0</b></div>
  <div class="card">On Hand<br><b id="onhand">0</b></div>
</div>

<div class="box">
  <h3>Add Product</h3>

  <input id="name" placeholder="Product Name">
  <input id="price" type="number" placeholder="Purchase Amount">
  <input id="shipping" type="number" placeholder="Shipping Fee">
  <input id="other" type="number" placeholder="Other Fees">
  <input id="image" type="file">

  <button onclick="addItem()">Add Item</button>
</div>

<div class="box">
  <input id="search" placeholder="Search..." onkeyup="loadItems()">

  <select id="filter" onchange="loadItems()">
    <option value="ALL">All</option>
    <option value="ON HAND">On Hand</option>
    <option value="SOLD">Sold</option>
  </select>
</div>

<div id="grid" class="grid"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzhvOEUeMnjsuTjdi6D2vFko9fEF_kkFcmhYoXA81dJkPjkr25ABfeyYSRbNwAu6lde/exec";

let profitChart=null;
let statusChart=null;
let monthlyChart=null;

function safeFetch(url,options={}){
  return fetch(url,options)
    .then(async r=>{
      const text = await r.text();
      try{
        return JSON.parse(text);
      }catch(e){
        console.error("RAW:",text);
        return null;
      }
    });
}

function loadDashboard(){
  safeFetch(API + "?action=getDashboard")
  .then(d=>{
    if(!d) return;
    document.getElementById("capital").innerText = d.totalCapital;
    document.getElementById("sales").innerText = d.totalSales;
    document.getElementById("profit").innerText = d.totalProfit;
    document.getElementById("onhand").innerText = d.onHand;
    document.getElementById("sold").innerText = d.sold;
  });
}

function loadItems(){
  safeFetch(API + "?action=getItems")
  .then(data=>{

    if(!Array.isArray(data)) return;

    renderCharts(data);

    const search = document.getElementById("search").value.toLowerCase();
    const filter = document.getElementById("filter").value;

    let html = "";

    data.forEach(row=>{

      const id = row[0] || "";
      const product = row[2] || "";
      const capital = row[7] || 0;
      const image = row[9] || "";
      const status = row[10] || "ON HAND";
      const soldPrice = row[12] || "";
      const profit = Number(row[13]) || 0;

      if(!product.toLowerCase().includes(search)) return;
      if(filter !== "ALL" && status !== filter) return;

     html += `
<div class="item">
  ${image ? `<img src="${image}">` : ""}
  <h3>${product}</h3>

  <p>Purchase: ₱${row[4]}</p>
  <p>Shipping: ₱${row[5]}</p>
  <p>Other Fees: ₱${row[6]}</p>
  <p>Total Capital: ₱${capital}</p>
  <p>Sold Price: ${soldPrice ? "₱"+soldPrice : "-"}</p>
  <p class="${profit>=0 ? 'profit-pos':'profit-neg'}">Profit: ₱${profit}</p>
  <p>Status: ${status}</p>

  ${status === "ON HAND"
    ? `<input type="number" id="sold-${id}" placeholder="Sold ₱">
       <button class="small-btn" onclick="markSold('${id}')">Mark Sold</button>`
    : `<button class="small-btn" onclick="editSold('${id}')">Edit Sold</button>`
  }

  <button class="small-btn" onclick="deleteItem('${id}')">Delete</button>
</div>
`;
    });

    document.getElementById("grid").innerHTML = html;
  });
}

function uploadImage(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();

    reader.onload = function(event){
      resolve(event.target.result);
    };

    reader.onerror = function(err){
      reject(err);
    };

    reader.readAsDataURL(file);
  });
}

async function addItem(){

  const file = document.getElementById("image").files[0];
  let photo = "";

  if(file){
    photo = await uploadImage(file);
  }

  safeFetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"addItem",
      productName:document.getElementById("name").value,
      purchaseAmount:Number(document.getElementById("price").value),
      shippingFee:Number(document.getElementById("shipping").value),
      otherFee:Number(document.getElementById("other").value),
      quantity:1,
      photoURL:photo
    })
  }).then(()=>{
    document.getElementById("name").value="";
    document.getElementById("price").value="";
    document.getElementById("shipping").value="";
    document.getElementById("other").value="";
    document.getElementById("image").value="";
    loadItems();
    loadDashboard();
  });
}

function markSold(id){
  const soldAmount = Number(document.getElementById("sold-"+id).value);
  if(!soldAmount) return alert("Enter sold amount");

  safeFetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"markSold",
      id:id,
      soldAmount:soldAmount
    })
  }).then(()=>{
    loadDashboard();
    loadItems();
  });
}

function editSold(id){
  const newSold = prompt("Enter new sold amount:");
  if(!newSold) return;

  safeFetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"editSold",
      id:id,
      soldAmount:Number(newSold)
    })
  }).then(()=>{
    loadDashboard();
    loadItems();
  });
}

function editItem(id){
  const newName = prompt("New product name:");
  const newPrice = prompt("New purchase amount:");
  if(!newName || !newPrice) return;

  safeFetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"editItem",
      id:id,
      productName:newName,
      purchaseAmount:Number(newPrice)
    })
  }).then(()=>{
    loadDashboard();
    loadItems();
  });
}

function deleteItem(id){
  if(!confirm("Delete this item?")) return;

  safeFetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"deleteItem",
      id:id
    })
  }).then(()=>{
    loadDashboard();
    loadItems();
  });
}

function renderCharts(data){

  let totalProfit = 0;
  let soldCount = 0;
  let onHandCount = 0;
  let monthly = {};

  data.forEach(r=>{

    totalProfit += Number(r[13]) || 0;

    if(r[10] === "SOLD") soldCount++;
    if(r[10] === "ON HAND") onHandCount++;

    const d = r[11] ? new Date(r[11]) : null;

    if(d && r[10] === "SOLD"){
      const key = (d.getMonth()+1)+"/"+d.getFullYear();
      monthly[key] = (monthly[key] || 0) + (Number(r[13]) || 0);
    }
  });

  if(profitChart) profitChart.destroy();
  if(statusChart) statusChart.destroy();
  if(monthlyChart) monthlyChart.destroy();

  profitChart = new Chart(document.getElementById("profitChart"),{
    type:"bar",
    data:{
      labels:["Profit"],
      datasets:[{data:[totalProfit]}]
    }
  });

  statusChart = new Chart(document.getElementById("statusChart"),{
    type:"pie",
    data:{
      labels:["On Hand","Sold"],
      datasets:[{data:[onHandCount,soldCount]}]
    }
  });

  monthlyChart = new Chart(document.getElementById("monthlyChart"),{
    type:"line",
    data:{
      labels:Object.keys(monthly),
      datasets:[{
        label:"Monthly Profit",
        data:Object.values(monthly)
      }]
    }
  });
}

loadDashboard();
loadItems();
</script>
</body>
</html>
