<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuySell Inventory Pro V3 Ultra</title>

  <style>
    * { box-sizing: border-box; font-family: Arial, sans-serif; }
    body { margin: 0; background: #f4f5f7; transition: .3s; color: #111; }
    .topbar { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px; background: rgba(255,255,255,.9); backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(0,0,0,.08); position: sticky; top: 0; z-index: 99; }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .app-icon { width: 52px; height: 52px; border-radius: 16px; background: #ececec; display: flex; align-items: center; justify-content: center; font-size: 28px; }
    .app-text h2, .app-text p { margin: 0; }
    .app-text p { font-size: 12px; color: gray; }
    .container { padding: 15px; max-width: 1200px; margin: auto; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 14px; margin: 15px 0; }
    .card { background: #fff; padding: 18px; border-radius: 18px; box-shadow: 0 6px 18px rgba(0,0,0,.06); text-align: center; transition: .25s; }
    .card:hover { transform: translateY(-3px); }
    .card small { display: block; color: gray; margin: 6px 0; }
    .box, .modal-content { background: #fff; padding: 15px; border-radius: 18px; box-shadow: 0 6px 18px rgba(0,0,0,.06); margin-top: 15px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-grid button { grid-column: span 2; }
    input, select, button { width: 100%; padding: 11px; border-radius: 10px; border: 1px solid #ccc; font-size: 14px; }
    button { border: none; background: #111; color: #fff; cursor: pointer; }
    button:hover { opacity: .92; }
    .category-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin: 15px 0; }
    .category-tabs button { width: auto; padding: 8px 14px; border-radius: 50px; background: #fff; color: #111; border: 1px solid #ddd; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px,1fr)); gap: 18px; margin-top: 15px; }
    .item { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,.07); position: relative; transition: .25s; }
    .item:hover { transform: translateY(-4px); }
    .item img { width: 100%; height: 220px; object-fit: cover; }
    .item-body { padding: 15px; }
    .status-pill { position: absolute; top: 12px; right: 12px; padding: 6px 12px; border-radius: 30px; font-size: 12px; background: #111; color: #fff; }
    .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .full-btn { grid-column: span 2; }
    #fabBtn { position: fixed; bottom: 22px; right: 22px; width: 62px; height: 62px; border-radius: 50%; font-size: 30px; z-index: 999; box-shadow: 0 8px 18px rgba(0,0,0,.25); }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); justify-content: center; align-items: center; z-index: 9999; }
    .switch { position: relative; width: 50px; height: 24px; display: inline-block; }
    .switch input { opacity: 0; }
    .slider { position: absolute; inset: 0; background: #ccc; border-radius: 30px; cursor: pointer; }
    .slider:before { content: ""; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .3s; }
    input:checked + .slider { background: #111; }
    input:checked + .slider:before { transform: translateX(26px); }
    .toast { position: fixed; top: 20px; right: 20px; background: #111; color: #fff; padding: 12px 18px; border-radius: 12px; display: none; z-index: 10000; }
    body.dark { background: #111; color: #fff; }
    body.dark .topbar, body.dark .card, body.dark .box, body.dark .modal-content, body.dark .item { background: #1d1d1d; color: #fff; box-shadow: none; }
    body.dark input, body.dark select { background: #2a2a2a; color: #fff; border: 1px solid #555; }
    body.dark .app-icon { background: #2a2a2a; }
    body.dark .category-tabs button { background: #2a2a2a; color: #fff; border: 1px solid #444; }
    @media(max-width:768px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-grid button { grid-column: span 1; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

  <div class="toast" id="toast"></div>

  <div class="topbar">
    <div class="topbar-left">
      <div class="app-icon">📦</div>
      <div class="app-text">
        <h2>BuySell Inventory Pro</h2>
        <p>Ultra Premium Inventory Dashboard</p>
      </div>
    </div>
    <label class="switch">
      <input type="checkbox" onchange="toggleDarkMode()" id="darkSwitch">
      <span class="slider"></span>
    </label>
  </div>

  <div class="container">

    <div class="cards">
      <div class="card">💸<small>Total Capital</small><h3 id="capital">₱0</h3></div>
      <div class="card">💰<small>Total Sales</small><h3 id="sales">₱0</h3></div>
      <div class="card">📈<small>Total Profit</small><h3 id="profit">₱0</h3></div>
      <div class="card">📦<small>On Hand</small><h3 id="onhand">0</h3></div>
      <div class="card">✅<small>Sold</small><h3 id="sold">0</h3></div>
    </div>

    <div id="addFormBox" class="box" style="display:none;">
      <div class="form-grid">
        <input id="name" placeholder="Product Name">
        <select id="category">
          <option>Gadget / Console</option>
          <option>Phone</option>
          <option>Appliance</option>
          <option>Others</option>
        </select>
        <input id="price" type="number" placeholder="Purchase Amount">
        <input id="shipping" type="number" placeholder="Shipping Fee">
        <input id="other" type="number" placeholder="Other Fee">
        <input id="image" type="file" accept="image/*">
        <button onclick="addItem()">Add Product</button>
      </div>
    </div>

    <div class="box">
      <input id="search" placeholder="Search product..." onkeyup="loadItems()">
      <select id="filter" onchange="loadItems()">
        <option value="ALL">All Status</option>
        <option value="ON HAND">On Hand</option>
        <option value="SOLD">Sold</option>
      </select>
    </div>

    <div class="category-tabs">
      <button onclick="setCategoryFilter('ALL')">All</button>
      <button onclick="setCategoryFilter('Gadget / Console')">Gadget / Console</button>
      <button onclick="setCategoryFilter('Phone')">Phone</button>
      <button onclick="setCategoryFilter('Appliance')">Appliance</button>
      <button onclick="setCategoryFilter('Others')">Others</button>
    </div>

    <div id="grid" class="grid"></div>

  </div>

  <button onclick="toggleAddForm()" id="fabBtn">+</button>

  <div id="editModal" class="modal">
    <div class="modal-content">
      <input type="hidden" id="edit-id">
      <input id="edit-name" placeholder="Product Name">
      <select id="edit-category">
        <option>Gadget / Console</option>
        <option>Phone</option>
        <option>Appliance</option>
        <option>Others</option>
      </select>
      <input id="edit-purchase" type="number" placeholder="Purchase Amount">
      <input id="edit-shipping" type="number" placeholder="Shipping Fee">
      <input id="edit-other" type="number" placeholder="Other Fee">
      <button onclick="saveEditItem()">Save Changes</button>
      <button onclick="closeEditModal()">Cancel</button>
    </div>
  </div>

  <script>
    const API = 'https://script.google.com/macros/s/AKfycbzhvOEUeMnjsuTjdi6D2vFko9fEF_kkFcmhYoXA81dJkPjkr25ABfeyYSRbNwAu6lde/exec';

    let activeCategory = 'ALL';

    function toast(msg) {
      const t = document.getElementById('toast');
      t.innerText = msg;
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 2000);
    }

    // FIX: use text/plain to avoid CORS preflight issues with Apps Script
    function safeFetch(url, o = {}) {
      if (o.method === 'POST') {
        o.headers = { 'Content-Type': 'text/plain;charset=utf-8' };
      }
      return fetch(url, o)
        .then(r => r.text())
        .then(t => {
          try { return JSON.parse(t); }
          catch (e) { return null; }
        });
    }

    // FIX: compress image before sending to avoid Apps Script payload limit
    function uploadImage(file) {
  return new Promise((res) => {
    // Timeout fallback — if image hangs after 8 seconds, skip it
    const timeout = setTimeout(() => {
      toast('Image skipped, adding product...');
      res('');
    }, 8000);

    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const MAX = 800;
        let w = img.width, h = img.height;
        if (w > MAX) { h = h * MAX / w; w = MAX; }
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        clearTimeout(timeout);
        res(canvas.toDataURL('image/jpeg', 0.7));
      };
      img.onerror = () => { clearTimeout(timeout); res(''); };
      img.src = e.target.result;
    };
    reader.onerror = () => { clearTimeout(timeout); res(''); };
    reader.readAsDataURL(file);
  });
}

    function setCategoryFilter(cat) {
      activeCategory = cat;
      loadItems();
    }

    function loadDashboard() {
      safeFetch(API + '?action=getDashboard').then(d => {
        if (!d) return;
        document.getElementById('capital').innerText = '₱' + (d.totalCapital || 0);
        document.getElementById('sales').innerText = '₱' + (d.totalSales || 0);
        document.getElementById('profit').innerText = '₱' + (d.totalProfit || 0);
        document.getElementById('onhand').innerText = d.onHand || 0;
        document.getElementById('sold').innerText = d.soldCount || 0;
      });
    }

    function loadItems() {
      safeFetch(API + '?action=getItems').then(data => {
        if (!Array.isArray(data)) return;

        let html = '';
        const s = document.getElementById('search').value.toLowerCase();
        const f = document.getElementById('filter').value;

        data.forEach(r => {
          const id = r[0] || '';
          const p = r[2] || '';
          const c = r[3] || '';
          const pu = +r[4] || 0;
          const sh = +r[5] || 0;
          const o = +r[6] || 0;
          const cap = +r[7] || 0;
          const img = r[9] || '';
          const st = r[10] || 'ON HAND';
          const soldp = +r[12] || 0;
          const pro = +r[13] || 0;

          if (p.toLowerCase().indexOf(s) === -1) return;
          if (f !== 'ALL' && st !== f) return;
          if (activeCategory !== 'ALL' && c !== activeCategory) return;

          html += `
            <div class='item'>
              <span class='status-pill'>${st}</span>
              ${img ? `<img src='${img}'>` : ''}
              <div class='item-body'>
                <h3>${p}</h3>
                <p>${c}</p>
                <p>Capital: ₱${cap}</p>
                <p>Sold: ${soldp ? ('₱' + soldp) : '-'}</p>
                <p style='color:${pro >= 0 ? "green" : "red"}'>Profit: ₱${pro}</p>
                ${st === 'ON HAND'
                  ? `<input id='sold-${id}' type='number' placeholder='Sold Amount'>
                     <button class='full-btn' onclick="markSold('${id}')">Mark Sold</button>`
                  : `<button class='full-btn' onclick="editSold('${id}')">Edit Sold</button>`
                }
                <div class='action-row'>
                  <button onclick="openEditModal('${id}','${p}','${c}','${pu}','${sh}','${o}')">Edit</button>
                  <button onclick="deleteItem('${id}')">Delete</button>
                </div>
              </div>
            </div>
          `;
        });

        document.getElementById('grid').innerHTML = html;
      });
    }

    // FIX: use document.getElementById('name') to avoid window.name collision
    async function addItem() {
  const nameVal = document.getElementById('name').value;
  if (!nameVal) return toast('Enter product name');

  const categoryVal = document.getElementById('category').value;
  const priceVal = document.getElementById('price').value;
  const shippingVal = document.getElementById('shipping').value;
  const otherVal = document.getElementById('other').value;
  const imageEl = document.getElementById('image');
  const file = imageEl.files[0];

  toast('Adding product...');  // ✅ immediate feedback so you know it's working

  let photo = '';
  try {
    if (file) photo = await uploadImage(file);
  } catch(e) {
    photo = '';  // if anything goes wrong, just skip image
  }

  try {
    await safeFetch(API, {
      method: 'POST',
      body: JSON.stringify({
        action: 'addItem',
        productName: nameVal,
        category: categoryVal,
        purchaseAmount: +priceVal,
        shippingFee: +shippingVal,
        otherFee: +otherVal,
        quantity: 1,
        photoURL: photo
      })
    });

    document.getElementById('name').value = '';
    document.getElementById('price').value = '';
    document.getElementById('shipping').value = '';
    document.getElementById('other').value = '';
    imageEl.value = '';

    toast('Product Added!');
    loadDashboard();
    loadItems();
    toggleAddForm(true);

  } catch(e) {
    toast('Failed to add product, try again.');
  }
}

    async function markSold(id) {
      const amt = +document.getElementById('sold-' + id).value;
      if (!amt) return toast('Enter sold amount');

      await safeFetch(API, {
        method: 'POST',
        body: JSON.stringify({ action: 'markSold', id: id, soldAmount: amt })
      });

      toast('Marked as Sold');
      loadDashboard();
      loadItems();
    }

    async function editSold(id) {
      const amt = prompt('Enter new sold amount');
      if (!amt) return;

      await safeFetch(API, {
        method: 'POST',
        body: JSON.stringify({ action: 'editSold', id: id, soldAmount: +amt })
      });

      toast('Sold Updated');
      loadDashboard();
      loadItems();
    }

    async function deleteItem(id) {
      if (!confirm('Delete item?')) return;

      await safeFetch(API, {
        method: 'POST',
        body: JSON.stringify({ action: 'deleteItem', id: id })
      });

      toast('Item Deleted');
      loadDashboard();
      loadItems();
    }

    function openEditModal(id, n, c, p, s, o) {
      document.getElementById('edit-id').value = id;
      document.getElementById('edit-name').value = n;
      document.getElementById('edit-category').value = c;
      document.getElementById('edit-purchase').value = p;
      document.getElementById('edit-shipping').value = s;
      document.getElementById('edit-other').value = o;
      document.getElementById('editModal').style.display = 'flex';
    }

    function closeEditModal() {
      document.getElementById('editModal').style.display = 'none';
    }

    async function saveEditItem() {
      await safeFetch(API, {
        method: 'POST',
        body: JSON.stringify({
          action: 'editItem',
          id: document.getElementById('edit-id').value,
          productName: document.getElementById('edit-name').value,
          category: document.getElementById('edit-category').value,
          purchaseAmount: +document.getElementById('edit-purchase').value,
          shippingFee: +document.getElementById('edit-shipping').value,
          otherFee: +document.getElementById('edit-other').value
        })
      });

      toast('Item Updated');
      closeEditModal();
      loadDashboard();
      loadItems();
    }

    function toggleDarkMode() {
      document.body.classList.toggle('dark');
      const d = document.body.classList.contains('dark');
      document.getElementById('darkSwitch').checked = d;
      localStorage.setItem('darkmode', d ? 'on' : 'off');
    }

    function loadDarkMode() {
      if (localStorage.getItem('darkmode') === 'on') {
        document.body.classList.add('dark');
        document.getElementById('darkSwitch').checked = true;
      }
    }

    function toggleAddForm(force = false) {
      const box = document.getElementById('addFormBox');
      if (force) { box.style.display = 'none'; return; }
      box.style.display = box.style.display === 'none' ? 'block' : 'none';
    }

    loadDarkMode();
    loadDashboard();
    loadItems();
  </script>

</body>
</html>
