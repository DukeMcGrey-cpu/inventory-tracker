<!DOCTYPE html>
<html>
<head>
  <title>Inventory Dashboard</title>

  <style>
    input, select {
  padding: 8px;
  margin: 5px;
  border-radius: 5px;
  border: 1px solid #ccc;
}
    body { font-family: Arial; padding: 20px; }
    .card { display: inline-block; padding: 10px 20px; margin: 10px; border: 1px solid #ccc; border-radius: 8px; }

    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #f4f4f4; }

    button { padding: 5px 10px; cursor: pointer; }

    input { padding: 6px; margin: 5px 0; }
  </style>
</head>

<body>

<h1>Inventory Dashboard</h1>

<!-- DASHBOARD -->
<div class="card">Total Capital: <span id="capital">0</span></div>
<div class="card">Total Sales: <span id="sales">0</span></div>
<div class="card">Total Profit: <span id="profit">0</span></div>
<div class="card">On Hand: <span id="onhand">0</span></div>
<div class="card">Sold: <span id="sold">0</span></div>

<hr>

<!-- ADD PRODUCT -->
<h2>Add Product</h2>

<input type="text" id="name" placeholder="Product Name"><br>
<input type="number" id="price" placeholder="Purchase Amount"><br>
<input type="file" id="image"><br><br>

<button onclick="addItem()">Add Item</button>

<hr>

<h2>Inventory List</h2>

<input type="text" id="search" placeholder="Search product..." onkeyup="loadItems()">

<select id="filter" onchange="loadItems()">
  <option value="ALL">All</option>
  <option value="ON HAND">On Hand</option>
  <option value="SOLD">Sold</option>
</select>

<br><br>

<!-- TABLE -->
<h2>Inventory List</h2>

<table>
  <thead>
    <tr>
      <th>Image</th>
      <th>ID</th>
      <th>Product</th>
      <th>Capital</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>

<script>

const API = "https://script.google.com/macros/s/AKfycbzhvOEUeMnjsuTjdi6D2vFko9fEF_kkFcmhYoXA81dJkPjkr25ABfeyYSRbNwAu6lde/exec";


// ================= DASHBOARD =================
function loadDashboard(){
  fetch(API + "?action=getDashboard")
  .then(r => r.json())
  .then(d => {
    document.getElementById("capital").innerText = d.totalCapital;
    document.getElementById("sales").innerText = d.totalSales;
    document.getElementById("profit").innerText = d.totalProfit;
    document.getElementById("onhand").innerText = d.onHand;
    document.getElementById("sold").innerText = d.sold;
  });
}


// ================= LOAD ITEMS =================
function loadItems(){

  fetch(API + "?action=getItems")
  .then(r => r.json())
  .then(data => {

    const search = document.getElementById("search").value.toLowerCase();
    const filter = document.getElementById("filter").value;

    let html = "";

    data.forEach(row => {

      const name = (row[2] || "").toLowerCase();
      const status = row[10];

      const matchSearch = name.includes(search);
      const matchFilter = (filter === "ALL") || (status === filter);

      if(!matchSearch || !matchFilter) return;

      const image = row[9]
        ? `<img src="${row[9]}" width="60" height="60" style="object-fit:cover;border-radius:6px;">`
        : "No Image";

      html += `
        <tr>
          <td>${image}</td>
          <td>${row[0]}</td>
          <td>${row[2]}</td>
          <td>${row[7]}</td>
          <td>${row[10]}</td>
          <td>
            ${row[10] === "ON HAND"
              ? `<button onclick="markSold('${row[0]}')">Mark Sold</button>`
              : "✔ Sold"}
          </td>
        </tr>
      `;
    });

    document.getElementById("table").innerHTML = html;
  });
}


// ================= IMAGE UPLOAD =================
function uploadImage(file){
  return new Promise((resolve, reject) => {

    const reader = new FileReader();

    reader.onload = function(e){

      fetch(API, {
        method: "POST",
        body: JSON.stringify({
          action: "uploadPhoto",
          fileName: file.name,
          mimeType: file.type,
          base64: e.target.result
        })
      })
      .then(r => r.json())
      .then(data => resolve(data.photoURL))
      .catch(err => reject(err));
    };

    reader.readAsDataURL(file);
  });
}


// ================= ADD ITEM =================
async function addItem(){

  const file = document.getElementById("image").files[0];

  let photoURL = "";

  if(file){
    photoURL = await uploadImage(file);
  }

  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;

  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "addItem",
      productName: name,
      purchaseAmount: Number(price),
      shippingFee: 0,
      otherFee: 0,
      quantity: 1,
      photoURL: photoURL
    })
  })
  .then(r => r.json())
  .then(() => {
    loadItems();
    loadDashboard();

    document.getElementById("name").value = "";
    document.getElementById("price").value = "";
    document.getElementById("image").value = "";
  });
}


// ================= MARK SOLD =================
function markSold(id){

  const soldAmount = prompt("Enter sold amount:");

  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "markSold",
      id: id,
      soldAmount: Number(soldAmount)
    })
  })
  .then(r => r.json())
  .then(() => {
    loadDashboard();
    loadItems();
  });
}


// ================= INIT =================
loadDashboard();
loadItems();

</script>

</body>
</html>
