<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    input, select {
  padding: 8px;
  margin: 5px;
  border-radius: 5px;
  border: 1px solid #ccc;
}
    .chart-container {
  width: 400px;
  max-width: 100%;
  margin: 20px 0;
}
    body { font-family: Arial; padding: 20px; }
    .card { display: inline-block; padding: 10px 20px; margin: 10px; border: 1px solid #ccc; border-radius: 8px; }

    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #f4f4f4; }

    button { padding: 5px 10px; cursor: pointer; }

    input { padding: 6px; margin: 5px 0; }

    @media (max-width: 768px) {

  body {
    padding: 10px;
  }

  .card {
    display: block;
    margin: 10px 0;
  }

  table {
    font-size: 12px;
  }

  th, td {
    padding: 6px;
  }

  input, select, button {
    width: 100%;
    margin-bottom: 8px;
  }

  canvas {
    width: 100% !important;
  }
}
  </style>
</head>

<body>

<h1>Inventory Dashboard</h1>

<!-- DASHBOARD -->
<div style="display:flex; flex-wrap:wrap; gap:10px;">
<div class="card">Total Capital: <span id="capital">0</span></div>
<div class="card">Total Sales: <span id="sales">0</span></div>
<div class="card">Total Profit: <span id="profit">0</span></div>
<div class="card">On Hand: <span id="onhand">0</span></div>
<div class="card">Sold: <span id="sold">0</span></div>
</div>
<hr>

<!-- ADD PRODUCT -->
<h2>Add Product</h2>

<input type="text" id="name" placeholder="Product Name"><br>
<input type="number" id="price" placeholder="Purchase Amount"><br>
<input type="file" id="image"><br><br>

<button onclick="addItem()">Add Item</button>

<hr>

<h2>Analytics</h2>

<div class="chart-container">
  <canvas id="profitChart"></canvas>
</div>

<div class="chart-container">
  <canvas id="statusChart"></canvas>
</div>

<hr>

<h2>Inventory List</h2>

<input type="text" id="search" placeholder="Search product..." onkeyup="loadItems()">

<select id="filter" onchange="loadItems()">
  <option value="ALL">All</option>
  <option value="ON HAND">On Hand</option>
  <option value="SOLD">Sold</option>
</select>

<br><br>

<!-- TABLE -->
<h2>Inventory List</h2>

<div id="grid" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:15px;"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbzhvOEUeMnjsuTjdi6D2vFko9fEF_kkFcmhYoXA81dJkPjkr25ABfeyYSRbNwAu6lde/exec";


// ================= DASHBOARD =================
function loadDashboard(){
  fetch(API + "?action=getDashboard")
  .then(r => r.json())
  .then(d => {
    document.getElementById("capital").innerText = d.totalCapital;
    document.getElementById("sales").innerText = d.totalSales;
    document.getElementById("profit").innerText = d.totalProfit;
    document.getElementById("onhand").innerText = d.onHand;
    document.getElementById("sold").innerText = d.sold;
  });
}


// ================= LOAD ITEMS =================
function loadItems(){

  fetch(API + "?action=getItems")
  .then(r => r.json())
  .then(data => {

    loadCharts(data);

    const search = document.getElementById("search").value.toLowerCase();
    const filter = document.getElementById("filter").value;

    let html = "";

    data.forEach(row => {

      const name = (row[2] || "").toLowerCase();
      const status = row[10];

      if(!name.includes(search)) return;
      if(filter !== "ALL" && status !== filter) return;

      const profit = Number(row[13]) || 0;
      const profitColor = profit >= 0 ? "green" : "red";

      const image = row[9]
        ? `<img src="${row[9]}" style="width:100%; height:150px; object-fit:cover; border-radius:10px;">`
        : "";

      html += `
        <div style="border:1px solid #ddd; border-radius:10px; padding:10px;">
          ${image}
          <h3>${row[2]}</h3>

          <p>Capital: ${row[7]}</p>
          <p style="color:${profitColor}; font-weight:bold;">
            Profit: ${profit}
          </p>
          <p>Sold Price: ${row[12] ? "₱" + row[12] : "-"}</p>
          
          <p>Status: ${status}</p>

         ${status === "ON HAND"
  ? `
    <div style="display:flex; gap:5px; align-items:center; margin-top:5px;">
      <input 
        type="number" 
        id="sold-${row[0]}" 
        placeholder="₱"
        style="width:80px; padding:4px; font-size:12px;"
      >

      <button onclick="markSold('${row[0]}')">
        Mark Sold
      </button>
    </div>
  `
  : "✔ Sold"}
        </div>
      `;
    });

    document.getElementById("grid").innerHTML = html;
  });
}


// ================= IMAGE UPLOAD =================
function uploadImage(file){
  return new Promise((resolve, reject) => {

    const reader = new FileReader();

    reader.onload = function(e){

      fetch(API, {
        method: "POST",
        body: JSON.stringify({
          action: "uploadPhoto",
          fileName: file.name,
          mimeType: file.type,
          base64: e.target.result
        })
      })
      .then(r => r.json())
      .then(data => resolve(data.photoURL))
      .catch(err => reject(err));
    };

    reader.readAsDataURL(file);
  });
}


// ================= ADD ITEM =================
async function addItem(){

  const file = document.getElementById("image").files[0];

  let photoURL = "";

  if(file){
    photoURL = await uploadImage(file);
  }

  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;

  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "addItem",
      productName: name,
      purchaseAmount: Number(price),
      shippingFee: 0,
      otherFee: 0,
      quantity: 1,
      photoURL: photoURL
    })
  })
  .then(r => r.json())
  .then(() => {
    loadItems();
    loadDashboard();

    document.getElementById("name").value = "";
    document.getElementById("price").value = "";
    document.getElementById("image").value = "";
  });
}


// ================= MARK SOLD =================
function markSold(id){

  const input = document.getElementById("sold-" + id);

  if(!input){
    alert("Input not found");
    return;
  }

  const soldAmount = Number(input.value);

  if(!soldAmount || soldAmount <= 0){
    alert("Please enter sold amount");
    return;
  }

  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "markSold",
      id: id,
      soldAmount: soldAmount
    })
  })
  .then(r => r.json())
  .then(res => {
    console.log(res); // debugging

    loadItems();
    loadDashboard();
  })
  .catch(err => {
    console.error(err);
    alert("Error updating item");
  });
}


// ================= INIT =================
loadDashboard();
loadItems();

  function loadCharts(data){

  let profit = 0;
  let sold = 0;
  let onhand = 0;

  data.forEach(row => {

    profit += Number(row[13]) || 0;

    if(row[10] === "SOLD") sold++;
    if(row[10] === "ON HAND") onhand++;
  });

  new Chart(document.getElementById("profitChart"), {
  type: "bar",
  data: {
    labels: ["Total Profit"],
    datasets: [{
      label: "Profit",
      data: [profit]
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false
  }
});

  new Chart(document.getElementById("statusChart"), {
  type: "pie",
  data: {
    labels: ["On Hand", "Sold"],
    datasets: [{
      data: [onhand, sold]
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false
  }
});
}

  function editItem(id){

  const newName = prompt("New product name:");
  const newPrice = prompt("New purchase amount:");

  if(!newName || !newPrice) return;

  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "editItem",
      id: id,
      productName: newName,
      purchaseAmount: Number(newPrice)
    })
  })
  .then(r => r.json())
  .then(() => {
    loadItems();
    loadDashboard();
  });
}
</script>

</body>
</html>
