<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuySell Inventory Pro V4</title>

<style>
body{margin:0;font-family:Arial;background:#f4f5f7}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:15px;background:#fff;position:sticky;top:0;box-shadow:0 4px 10px rgba(0,0,0,.1)}
.container{padding:15px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.card{background:#fff;padding:15px;border-radius:12px;text-align:center}
.box{background:#fff;padding:15px;border-radius:12px;margin-top:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;margin-top:15px}
.item{background:#fff;border-radius:12px;overflow:hidden}
.item img{width:100%;height:200px;object-fit:cover}
.item-body{padding:10px}
button{padding:10px;width:100%;margin-top:5px;cursor:pointer}
</style>
</head>

<body>

<div class="topbar">
  <h3>📦 Inventory V4</h3>
</div>

<div class="container">

<div class="cards">
  <div class="card">Capital <div id="capital">0</div></div>
  <div class="card">Sales <div id="sales">0</div></div>
  <div class="card">Profit <div id="profit">0</div></div>
  <div class="card">On Hand <div id="onhand">0</div></div>
  <div class="card">Sold <div id="sold">0</div></div>
</div>

<div class="box">
  <input id="name" placeholder="Product Name">
  <select id="category">
    <option>Gadget / Console</option>
    <option>Phone</option>
    <option>Appliance</option>
    <option>Others</option>
  </select>

  <input id="price" type="number" placeholder="Purchase">
  <input id="shipping" type="number" placeholder="Shipping">
  <input id="other" type="number" placeholder="Other">
  <input id="image" type="file">

  <button onclick="addItem()">Add Product</button>
</div>

<div id="grid" class="grid"></div>

</div>

<script>
const API='https://script.google.com/macros/s/AKfycbzhvOEUeMnjsuTjdi6D2vFko9fEF_kkFcmhYoXA81dJkPjkr25ABfeyYSRbNwAu6lde/exec';
let activeCategory='ALL';

/* SAFE FETCH (FIXED) */
function safeFetch(url,o={}){
  return fetch(url,o)
    .then(r=>r.text())
    .then(t=>{
      try{return JSON.parse(t)}
      catch(e){console.log("RAW:",t);return null;}
    });
}

/* IMAGE UPLOAD (UNCHANGED BUT SAFE) */
function uploadImage(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>resolve(e.target.result);
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

/* ADD ITEM (FIXED CRITICAL BUGS) */
async function addItem(){

  const file=document.getElementById('image').files[0];
  let photo='';

  if(file){
    photo=await uploadImage(file);
  }

  await safeFetch(API,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      action:'addItem',
      productName:document.getElementById('name').value,
      category:document.getElementById('category').value,
      purchaseAmount:Number(document.getElementById('price').value),
      shippingFee:Number(document.getElementById('shipping').value),
      otherFee:Number(document.getElementById('other').value),
      quantity:1,
      photoURL:photo
    })
  });

  document.getElementById('name').value='';
  document.getElementById('price').value='';
  document.getElementById('shipping').value='';
  document.getElementById('other').value='';
  document.getElementById('image').value='';

  loadDashboard();
  loadItems();
}

/* DASHBOARD (FIXED SOLD COUNT ISSUE) */
function loadDashboard(){
  safeFetch(API+'?action=getDashboard').then(d=>{
    if(!d)return;

    document.getElementById("capital").innerText=d.totalCapital||0;
    document.getElementById("sales").innerText=d.totalSales||0;
    document.getElementById("profit").innerText=d.totalProfit||0;
    document.getElementById("onhand").innerText=d.onHand||0;
    document.getElementById("sold").innerText=d.soldCount||0;
  });
}

/* LOAD ITEMS (FIXED INDEX SAFETY) */
function loadItems(){

  safeFetch(API+'?action=getItems').then(data=>{

    if(!Array.isArray(data))return;

    let html='';

    const searchVal=document.getElementById("search").value.toLowerCase();
    const filterVal=document.getElementById("filter").value;

    data.forEach(row=>{

      const id=row[0];
      const product=row[2]||"";
      const category=row[3]||"";
      const purchase=row[4]||0;
      const shipping=row[5]||0;
      const other=row[6]||0;
      const capital=row[7]||0;
      const image=row[9]||"";
      const status=row[10]||"ON HAND";
      const soldPrice=row[12]||"";
      const profit=row[13]||0;

      if(product.toLowerCase().indexOf(searchVal)===-1)return;
      if(filterVal!=="ALL"&&status!==filterVal)return;
      if(activeCategory!=="ALL"&&category!==activeCategory)return;

      html+=`
      <div class="item">
        ${image?`<img src="${image}">`:""}
        <div class="item-body">
          <h3>${product}</h3>
          <p>${category}</p>
          <p>Capital: ₱${capital}</p>
          <p>Sold: ${soldPrice?("₱"+soldPrice):"-"}</p>
          <p style="color:${profit>=0?'green':'red'}">Profit: ₱${profit}</p>
          <p>Status: ${status}</p>

          ${
            status==="ON HAND"
            ? `<input id="sold-${id}" type="number" placeholder="Sold Amount">
               <button onclick="markSold('${id}')">Mark Sold</button>`
            : `<button onclick="editSold('${id}')">Edit Sold</button>`
          }

        </div>
      </div>`;
    });

    document.getElementById("grid").innerHTML=html;
  });
}

/* MARK SOLD (FIXED SAFE NUMBER) */
async function markSold(id){

  const amt=Number(document.getElementById("sold-"+id).value);

  if(!amt)return;

  await safeFetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      action:"markSold",
      id:id,
      soldAmount:amt
    })
  });

  loadDashboard();
  loadItems();
}

/* EDIT SOLD */
async function editSold(id){

  const amt=prompt("Enter new sold amount");
  if(!amt)return;

  await safeFetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      action:"editSold",
      id:id,
      soldAmount:Number(amt)
    })
  });

  loadDashboard();
  loadItems();
}

/* DELETE */
async function deleteItem(id){

  if(!confirm("Delete item?"))return;

  await safeFetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      action:"deleteItem",
      id:id
    })
  });

  loadDashboard();
  loadItems();
}
</script>

</body>
</html>
